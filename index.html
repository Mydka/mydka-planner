<style>

.app{display:flex;width:100%;min-height:100vh}
.sb{width:178px;background:#1E2433;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;justify-content:space-between}

.cal-nav{display:flex;align-items:center;gap:10px;margin-bottom:9px}

.aff-table{border-collapse:collapse;width:100%;background:#fff}

.aff-table tbody td.l{text-align:left;padding-left:9px;font-weight:600;color:#374151;font-size:11px;width:auto;min-width:auto;max-width:none}
.aff-table tbody tr:hover:not(.dim) td{background:#FAFAF8}
.aff-table tbody tr.dim td{color:#C4C4C4;background:#FAFAFA}

.chip{display:inline-flex;align-items:center;justify-content:center;padding:2px 5px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;min-width:22px;user-select:none;position:relative}

.chip-abs{opacity:.45}
.chip-pin{position:absolute;top:-3px;right:-3px;font-size:7px}

.cell-add{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#F3F4F6;color:#9CA3AF;font-size:11px;cursor:pointer;border:1px dashed #D1D5DB}

.cf{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.cfb{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;border:2px solid #E5E7EB;background:#fff;color:#374151}

.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:11px}
.dc{background:#fff;border-radius:9px;border:1px solid #E5E7EB;padding:13px 15px}
.da{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#fff}
.dn{font-size:13px;font-weight:700;color:#111}
.ds2{font-size:11px;color:#6B7280;margin-top:1px}
.df{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #F3F4F6}

.dfl{color:#6B7280;width:58px;flex-shrink:0;font-size:11px}
.ab{width:24px;height:24px;border:none;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;padding:0}

.vdd{position:absolute;left:0;right:0;top:calc(100% + 3px);background:#fff;border:1px solid #D1D5DB;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.12);z-index:999;max-height:180px;overflow-y:auto}
.vo{display:flex;align-items:center;gap:7px;padding:7px 10px;font-size:11px}
.vo:hover{background:#F3F4F6}.vo.sel{background:#EFF6FF;color:#1D4ED8;font-weight:600}
.vo-p{font-weight:700;font-family:monospace;font-size:11px;flex:1}
.vo-free{font-size:10px;color:#16A34A;font-weight:600}
.vo-att{font-size:10px;color:#2563EB;background:#EFF6FF;padding:1px 5px;border-radius:3px;font-weight:600}
.vo-warn{font-size:10px;color:#D97706;background:#FEF9C3;padding:1px 5px;border-radius:3px}
.vo-sep{padding:4px 10px;font-size:9px;font-weight:700;text-transform:uppercase;color:#9CA3AF;background:#F9FAFB;border-top:1px solid #E5E7EB}
.vbadge{background:#FEF9C3;color:#92400E;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:700}
.badge-p{background:#EEF2FF;color:#4338CA;font-size:9px;padding:1px 5px;border-radius:5px;font-weight:600}
.badge-r{background:#FEF3C7;color:#92400E;font-size:9px;padding:1px 5px;border-radius:5px;font-weight:600}
.badge-np{background:#F3F4F6;color:#6B7280;border:1px solid #D1D5DB;font-size:9px;padding:1px 5px;border-radius:5px;font-weight:600}
.vg{display:grid;grid-template-columns:repeat(auto-fill,minmax(192px,1fr));gap:10px}
.vc2{background:#fff;border-radius:9px;border:1px solid #E5E7EB;padding:11px 13px;display:flex;align-items:center;gap:10px}
.cg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:10px}
.clc{background:#fff;border-radius:9px;border:1px solid #E5E7EB;padding:11px 13px;display:flex;align-items:center;gap:10px}
.clogo{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.tsel{border:2px solid #E5E7EB;border-radius:5px;padding:2px 5px;font-size:12px;font-weight:600;background:#fff}
.eq-list{background:#fff;border-radius:9px;border:1px solid #E5E7EB;padding:14px}
.eq-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #F3F4F6}
.eq-row:last-child{border-bottom:none}

.ebadge{font-size:9px;padding:2px 6px;border-radius:6px;font-weight:700;display:inline-block;min-width:62px;text-align:center}
.e-over{background:#FEE2E2;color:#991B1B}.e-under{background:#FEF9C3;color:#854D0E}.e-ok{background:#D1FAE5;color:#065F46}

.dmo-bg.open{display:flex}
.dmo{background:#1E2433;border-radius:14px;width:440px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.dmo-header{padding:15px 18px 12px;border-bottom:1px solid rgba(255,255,255,.08)}
.dmo-hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.dmo-date{color:#fff;font-size:16px;font-weight:700}
.dmo-close{width:26px;height:26px;background:rgba(255,255,255,.1);border:none;border-radius:6px;color:#9CA3AF;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.dmo-section{padding:13px 18px;border-bottom:1px solid rgba(255,255,255,.07)}
.dmo-stitle{color:#9CA3AF;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.dmo-dg{display:grid;grid-template-columns:1fr 1fr;gap:5px}

.s-present{background:rgba(34,197,94,.2);color:#4ADE80}
.s-absent{background:rgba(239,68,68,.2);color:#F87171}

.s-maladie{background:rgba(139,92,246,.2);color:#C4B5FD}
.stat-dd{position:absolute;top:calc(100% + 3px);right:0;background:#fff;border:1px solid #D1D5DB;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.15);z-index:4000;min-width:120px;overflow:hidden}
.stat-dd-opt{display:flex;align-items:center;gap:7px;padding:7px 10px;font-size:11px;cursor:pointer;color:#374151}
.stat-dd-opt:hover{background:#F3F4F6}
.dmo-cl-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.dmo-cl-row:last-child{border-bottom:none}
.dmo-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dmo-clname{color:#E5E7EB;font-size:13px;font-weight:600;flex:1}
.dmo-ti{width:52px;text-align:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:7px;color:#fff;font-size:15px;font-weight:700;padding:4px 6px;font-family:inherit}
.dmo-ti:focus{outline:none;border-color:#F97316;background:rgba(249,115,22,.1)}
.dmo-tl{color:#6B7280;font-size:11px;width:58px}
.dmo-cap-alert{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:9px 13px;font-size:12px;color:#FCA5A5;font-weight:600;margin:10px 18px 0;display:none}
.dmo-cap-alert.show{display:block}
.dmo-save{width:100%;padding:13px;background:#F97316;color:#fff;border:none;border-radius:0 0 14px 14px;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px}
.dmo-save:hover{background:#e06a0a}
.cl-dd,.add-dd{position:absolute;top:calc(100% + 3px);left:50%;transform:translateX(-50%);background:#fff;border:1px solid #D1D5DB;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.12);z-index:1500;min-width:130px;overflow:hidden}
.cl-dd-opt,.add-dd-opt{display:flex;align-items:center;gap:7px;padding:7px 10px;font-size:11px;font-weight:600;cursor:pointer;color:#374151}

.cl-dd-sep{border-top:1px solid #F3F4F6;margin:2px 0}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:2000;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:20px;width:360px;max-width:94vw;max-height:85vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.18)}
.modal-title{font-size:15px;font-weight:700;margin-bottom:2px}
.modal-sub{font-size:12px;color:#6B7280;margin-bottom:13px}
.fg{margin-bottom:10px}
.fl{font-size:11px;font-weight:600;color:#374151;margin-bottom:4px;display:block}
.fi,.fs{width:100%;padding:7px 9px;border:1px solid #D1D5DB;border-radius:6px;font-size:12px;font-family:inherit;color:#111}
.fi:focus,.fs:focus{outline:none;border-color:#3B82F6}
.mfoot{display:flex;justify-content:flex-end;gap:7px;margin-top:13px;padding-top:12px;border-top:1px solid #E5E7EB}
.toast-c{position:fixed;bottom:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:5px}
.toastm{background:#1E2433;color:#fff;padding:9px 14px;border-radius:8px;font-size:12px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:tIn .2s ease}
@keyframes tIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%;flex-direction:column;gap:10px}
.spin{width:28px;height:28px;border:3px solid #E5E7EB;border-top-color:#F97316;border-radius:50%;animation:sp .7s linear infinite}

.sc3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.scard{background:#fff;border-radius:9px;border:1px solid #E5E7EB;padding:11px 13px}
.sl{font-size:10px;color:#9CA3AF;text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:4px}
.sv{font-size:21px;font-weight:700;color:#111}
.rules-box{background:#fff;border-radius:10px;border:1px solid #E5E7EB;padding:14px 16px;margin-top:18px}
.attr-warn{background:#FEF9C3;border:1px solid #FCD34D;border-radius:7px;padding:8px 12px;font-size:11px;color:#92400E;margin-top:8px}
.attr-err{background:#FEF2F2;border:1px solid #FCA5A5;border-radius:7px;padding:8px 12px;font-size:11px;color:#DC2626;margin-top:6px}
.attr-ok{background:#F0FDF4;border:1px solid #86EFAC;border-radius:7px;padding:8px 12px;font-size:11px;color:#16A34A;margin-top:6px}
.dmo-dr-noweh{background:#FEF2F2!important;border-radius:6px;border:1px solid #FCA5A5!important;}
.cg-table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #E5E7EB}
.cg-table th{background:#1E2433;color:#fff;padding:9px 12px;font-size:11px;font-weight:600;text-align:left}
.cg-table td{padding:9px 12px;border-bottom:1px solid #F3F4F6;font-size:12px;vertical-align:middle}
.cg-table tr:last-child td{border-bottom:none}
.cg-table tr:hover td{background:#FAFAF8}
.cg-badge{padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700}
.wa-card{background:#fff;border-radius:9px;border:1px solid #E5E7EB;padding:13px 15px;display:flex;align-items:center;gap:12px}
.wa-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}

.wa-btn:hover{background:#1ebe5d}

/* ── MOBILE RESPONSIVE ─────────────────────────────────── */
@media(max-width:768px){
  .sb{display:none!important}
  .content{margin-left:0!important;padding:10px!important;padding-bottom:75px!important}
  .mob-nav{display:flex!important}
  .ptitle{font-size:16px}
  .tbl-outer{overflow-x:auto;-webkit-overflow-scrolling:touch}

  .cal-grid{font-size:10px}
  .cc{min-height:58px;padding:3px}
  .dg{grid-template-columns:1fr!important}
  .ph-row{flex-direction:column;align-items:flex-start;gap:6px}
  .dmo{width:100%!important;max-width:100%!important;border-radius:12px 12px 0 0!important;margin:auto 0 0!important;max-height:92vh!important;overflow-y:auto}

function nbVehHSJour(ds){
  return planDrivers().filter(dr=>{

    // Cas 1 : dr.veh pointe vers un véhicule hors service (pas de libération enregistrée)
    if(dr.veh){
      const vObj=G.veh.find(v=>v.id===dr.veh);
      if(vObj&&!vObj.actif)return true;

    // Cas 2 : getVehForDay retourne un veh hors service
    const vRaw=getVehForDay(dr.id,ds);

    const vId=vRaw.replace('|SWAP','').replace('|PERIOD_START','').replace('|PERIOD','');

  if(r.jours.length>0&&!r.jours.includes(dow))return null;
  return r.clientId;
}
function eqScore(){const c=planDrivers().map(d=>cf(d.id)),a=c.filter(x=>x>0);if(!a.length)return 100;const mx=Math.max(...a),mn=Math.min(...a);return mx?Math.round((1-(mx-mn)/mx)*100):100;}

// Compte les tournées affectées dans un objet compteur local (pas G.aff global)
function cfLocal(id, compteur){ return compteur[id]||0; }

function autoDispatch(ds, compteurMois){
  // compteurMois : {driverId: nbTournéesDejaAffectéesCeMois} — passé par dispatchMois pour l'équité globale
  // Si appelé seul (1 jour), on utilise cf() basé sur G.aff existant
  const useLocal = !!compteurMois;
  const cpt = compteurMois || {};

  Object.keys(G.aff).filter(k=>k.startsWith(ds+'_')).forEach(k=>delete G.aff[k]);
  const presAll=presentsDs(ds);
  const presNorm=presAll.filter(d=>!d.reserve);
  const presRes=presAll.filter(d=>d.reserve);
  const totalTours=toursDay(ds);
  // Réservistes seulement si manque de normaux
  const pres=presNorm.length>=totalTours ? presNorm : [...presNorm,...presRes];
  const assigned=new Set();

  // Étape 1 : règles fixes (pinned) chauffeur → client
  pres.forEach(dr=>{
    const cid=pinnedClient(dr.id,ds);if(!cid)return;
    const cl=G.clients.find(c=>c.id===cid);if(!cl)return;
    setAff(ds,dr.id,cid);assigned.add(dr.id);
    if(useLocal) cpt[dr.id]=(cpt[dr.id]||0)+1;
  });

  // Étape 1b : règles d'ordre (client → chauffeurs prioritaires)
  (G.reglesOrdre||DEF.reglesOrdre||[]).forEach(ro=>{
    const dow=new Date(ds+'T00:00:00').getDay();
    if(ro.jours&&ro.jours.length>0&&!ro.jours.includes(dow))return;
    const cl=G.clients.find(c=>c.id===ro.clientId);if(!cl)return;
    const tot=gTP(ds,cl.id)!==null?gTP(ds,cl.id):cl.t;
    let assignedForClient=[...assigned].filter(id=>G.aff[ds+'_'+id]===cl.id).length;
    if(assignedForClient>=tot)return; // quota déjà atteint
    // Parcourir l'ordre de priorité
    for(const nomPref of ro.ordre){
      if(assignedForClient>=tot)break;
      const dr=pres.find(d=>!assigned.has(d.id)&&d.nom.toLowerCase().includes(nomPref.toLowerCase()));
      if(!dr)continue;
      if(isBloqueClient(dr.id,cl.id))continue;
      setAff(ds,dr.id,cl.id);assigned.add(dr.id);
      assignedForClient++;
      if(useLocal)cpt[dr.id]=(cpt[dr.id]||0)+1;
    }
  });

  // Étape 2 : quotas restants
  const quotas={};
  G.clients.forEach(cl=>{
    const tot=gTP(ds,cl.id)!==null?gTP(ds,cl.id):cl.t;
    const used=[...assigned].filter(id=>G.aff[ds+'_'+id]===cl.id).length;
    quotas[cl.id]=Math.max(0,tot-used);
  });

  // Étape 3 : trier par nb tournées ce mois (équité) — le moins servi passe en 1er
  // Exclure les chauffeurs sans camion (libéré) du dispatch
  const libreAll=pres.filter(d=>!assigned.has(d.id));
  const libre=libreAll.filter(d=>{
    const v=getVehForDay(d.id,ds);
    return !v.startsWith('|LIBRE')&&v!=='|LIBRE'&&v!=='—'&&!!v;
  }).sort((a,b)=>(useLocal ? cfLocal(a.id,cpt)-cfLocal(b.id,cpt) : cf(a.id)-cf(b.id)));
  // Chauffeurs sans camion → signalés mais non dispatchés
  const sansVeh=libreAll.filter(d=>{const v=getVehForDay(d.id,ds);return v.startsWith('|LIBRE')||v==='—'||!v||v==='|LIBRE';});

  // Règles de préférence client → chauffeurs favoris (ordre prioritaire, non obligatoire)
  // Structure : {clientId: [nomPartiel1, nomPartiel2, ...]} — ordre = priorité
  const PREFERENCES={
    'DA':['Ghiles','Yanis','Hicham','Hamza']
  };
  // Fonction de score préférence : 0 = favori #1, 1 = favori #2, etc. 999 = non favori
  function prefScore(driverId, clientId){
    const prefs=PREFERENCES[clientId];
    if(!prefs)return 999;
    const dr=G.drivers.find(d=>d.id===driverId);
    if(!dr)return 999;
    const idx=prefs.findIndex(p=>dr.nom.toLowerCase().includes(p.toLowerCase()));
    return idx>=0?idx:999;
  }

  // Dispatch équitable avec préférences : round-robin + tri préférence + équité
  const clientsAvecQuota=G.clients.filter(cl=>quotas[cl.id]>0);
  let remaining={};clientsAvecQuota.forEach(cl=>remaining[cl.id]=quotas[cl.id]);
  let changed=true;
  while(changed){
    changed=false;
    clientsAvecQuota.forEach(cl=>{
      if(remaining[cl.id]<=0)return;
      // Trier : préférence d'abord, puis équité (nb tournées)
      const dispo=libre
        .filter(d=>!isBloqueClient(d.id,cl.id)&&!assigned.has(d.id))
        .sort((a,b)=>{
          const pa=prefScore(a.id,cl.id);
          const pb=prefScore(b.id,cl.id);
          // Si même niveau préférence → équité
          if(pa===pb)return useLocal?cfLocal(a.id,cpt)-cfLocal(b.id,cpt):cf(a.id)-cf(b.id);
          // Favoris en premier, mais seulement si pas trop en surcharge vs les autres
          // (max 2 tournées d'écart pour éviter surcharge des favoris)
          const ecartA=useLocal?cfLocal(a.id,cpt):cf(a.id);
          const ecartB=useLocal?cfLocal(b.id,cpt):cf(b.id);
          if(pa<pb&&ecartA-ecartB<=2)return -1; // a favori et pas trop chargé
          if(pb<pa&&ecartB-ecartA<=2)return 1;  // b favori et pas trop chargé
          return ecartA-ecartB; // sinon équité pure
        });
      if(!dispo.length)return;
      const dr=dispo[0];
      setAff(ds,dr.id,cl.id);
      assigned.add(dr.id);
      if(useLocal)cpt[dr.id]=(cpt[dr.id]||0)+1;
      remaining[cl.id]--;
      changed=true;
    });
  }
}

function dispatchMois(){
  const y=G.y,m=G.m,dim=new Date(y,m+1,0).getDate();

  // Calculer "demain" : les jours passés + aujourd'hui sont préservés
  const now=new Date();
  const todayStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');

  // Compteur partagé : initialiser avec les tournées déjà assignées (jours passés + aujourd'hui)
  // pour que le dispatch futur soit équitable par rapport à ce qui a déjà été fait
  const cpt={};
  planDrivers().forEach(d=>cpt[d.id]=0);

  // Compter les tournées des jours passés + aujourd'hui dans le compteur
  for(let d=1;d<=dim;d++){
    if(new Date(y,m,d).getDay()===0)continue;
    const ds=`${y}-${pd(m+1)}-${pd(d)}`;
    if(ds<=todayStr){
      // Jour passé ou aujourd'hui → compter sans toucher aux données
      planDrivers().forEach(dr=>{if(getAff(ds,dr.id))cpt[dr.id]=(cpt[dr.id]||0)+1;});
    }
  }

  // Effacer UNIQUEMENT les affectations à partir de demain
  for(let d=1;d<=dim;d++){
    if(new Date(y,m,d).getDay()===0)continue;
    const ds=`${y}-${pd(m+1)}-${pd(d)}`;
    if(ds>todayStr){
      Object.keys(G.aff).filter(k=>k.startsWith(ds+'_')).forEach(k=>delete G.aff[k]);
    }
  }

  // Re-dispatcher uniquement à partir de demain
  // PROTÉGER les jours modifiés manuellement SAUF si les tournées ont changé
  const manualDays=G.manualDays||{};
  let dispatched=0,skipped=0;
  for(let d=1;d<=dim;d++){
    if(new Date(y,m,d).getDay()===0)continue; // dimanche toujours ignoré
    const ds=`${y}-${pd(m+1)}-${pd(d)}`;
    if(ds>todayStr){
      // Vérifier si le nb total de tournées a changé vs ce qui est dispatché
      const totalPrev=Object.keys(G.aff).filter(k=>k.startsWith(ds+'_')&&G.aff[k]).length;
      const totalNow=toursDay(ds);
      const toursChanged=totalNow!==totalPrev&&totalNow>0;
      if(manualDays[ds]&&!toursChanged){
        // Jour modifié manuellement et pas de changement → préserver
        planDrivers().forEach(dr=>{if(getAff(ds,dr.id))cpt[dr.id]=(cpt[dr.id]||0)+1;});
        skipped++;
      } else {
        // Re-dispatcher : nouvelles tournées OU pas protégé
        autoDispatch(ds,cpt);
        dispatched++;
      }
    }
  }

  dbSave();
  rPlanning(document.getElementById('content'));
  let msg='Re-dispatch ✓ ('+dispatched+' jours)';
  if(skipped>0)msg+=' · '+skipped+' jour(s) manuel(s) préservé(s)';
  toast(msg);
}

async function doMigrate(){
  const btn=document.getElementById('mig-btn');
  if(btn)btn.disabled=true;
  const prog=document.getElementById('mig-progress');
  const keys=[SK+'_m',SK+'_c',SK+'_h',SK+'_s',SK+'_a'];
  let ok=0;
  for(const key of keys){
    try{
      if(prog)prog.textContent='Migration '+key.split('_').pop()+'...';
      let val=null;
      if(window.storage){
        const r=await window.storage.get(key).catch(()=>null);
        if(r&&r.value)val=r.value;
      }
      if(!val){
        // Construire depuis G si pas de storage local
        await dbSave();
        if(prog)prog.textContent='Données sauvegardées sur Supabase ✓';
        await new Promise(r=>setTimeout(r,500));
        closeMo();
        toast('✓ Migration terminée — données envoyées sur Supabase !');
        return;
      }
      await sbSet(key,val);
      ok++;
      if(prog)prog.innerHTML='<span style="color:#16A34A">✓ '+ok+'/'+keys.length+' clés migrées</span>';

      if(prog)prog.innerHTML='<span style="color:#DC2626">Erreur sur '+key+'</span>';

  toast('&#10003; Migration terminée ! Données synchronisées sur Supabase.');
}

function onTourInput(ds){
  G.clients.forEach(cl=>{const inp=document.getElementById('tp-'+ds+'-'+cl.id);if(inp)G.tours_prov[ds+'_'+cl.id]=parseInt(inp.value)||0;});
  refreshDmoHeader(ds);
  // Autosave immédiat pour ne pas perdre les saisies
  dbSave();
}
function saveDayMo(ds){
  // Sauvegarder les tournées par client
  G.clients.forEach(cl=>{const inp=document.getElementById('tp-'+ds+'-'+cl.id);if(inp)G.tours_prov[ds+'_'+cl.id]=parseInt(inp.value)||0;});
  const isSun=new Date(ds+'T00:00:00').getDay()===0;
  const today=new Date().toISOString().slice(0,10);
  const isPast=ds<today;
  if(isPast){
    // Jour passé : sauvegarder SANS re-dispatcher — conserver les affectations existantes
    if(!G.manualDays)G.manualDays={};
    G.manualDays[ds]=true;
    closeDayMo();dbSave();
    // Rafraîchir la vue active
    const activeNav=document.querySelector('.ni.active');
    if(activeNav&&activeNav.id==='ni-tableau')rTableau(document.getElementById('content'));
    else rPlanning(document.getElementById('content'));
    toast('Présences sauvegardées ✓');
  } else if(isSun){
    // Dimanche futur : saisie manuelle
    if(!G.manualDays)G.manualDays={};
    G.manualDays[ds]=true;
    const totalT=toursDay(ds);
    if(totalT>0) autoDispatchManuel(ds);
    closeDayMo();dbSave();rPlanning(document.getElementById('content'));toast('Dimanche sauvegardé ✓');
  } else {
    // Jour futur normal : dispatcher + protéger
    autoDispatch(ds);
    if(!G.manualDays)G.manualDays={};
    G.manualDays[ds]=true;
    closeDayMo();dbSave();
    const activeNav=document.querySelector('.ni.active');
    if(activeNav&&activeNav.id==='ni-tableau')rTableau(document.getElementById('content'));
    else rPlanning(document.getElementById('content'));
    toast('Sauvegarde & dispatch ✓');
  }
}
function closeDayMo(){document.getElementById('dmo-bg').classList.remove('open');}
function unprotectDay(ds){
  if(G.manualDays)delete G.manualDays[ds];
  dbSave();closeDayMo();rPlanning(document.getElementById('content'));
  toast('Protection retirée — ce jour sera re-dispatché automatiquement');
}

// Dispatch manuel : comme autoDispatch mais sans filtrer les chauffeurs sans camion
// Utilisé pour les dimanches et les jours de saisie manuelle forcée
function autoDispatchManuel(ds, compteurMois){
  const useLocal=!!compteurMois;
  const cpt=compteurMois||{};
  Object.keys(G.aff).filter(k=>k.startsWith(ds+'_')).forEach(k=>delete G.aff[k]);
  // Tous les présents (sans filtre camion)
  const pres=presentsDs(ds);
  const assigned=new Set();
  // Étape 1 : règles fixes
  pres.forEach(dr=>{
    const cid=pinnedClient(dr.id,ds);if(!cid)return;
    const cl=G.clients.find(c=>c.id===cid);if(!cl)return;
    setAff(ds,dr.id,cid);assigned.add(dr.id);
    if(useLocal)cpt[dr.id]=(cpt[dr.id]||0)+1;
  });
  // Étape 2 : quotas
  const quotas={};
  G.clients.forEach(cl=>{
    const tot=gTP(ds,cl.id)!==null?gTP(ds,cl.id):cl.t;
    const used=[...assigned].filter(id=>G.aff[ds+'_'+id]===cl.id).length;
    quotas[cl.id]=Math.max(0,tot-used);
  });
  // Étape 3 : distribuer sans filtre camion
  const libre=pres.filter(d=>!assigned.has(d.id))
    .sort((a,b)=>(useLocal?cfLocal(a.id,cpt)-cfLocal(b.id,cpt):cf(a.id)-cf(b.id)));
  let idx=0;
  G.clients.forEach(cl=>{
    for(let i=0;i<quotas[cl.id]&&idx<libre.length;i++,idx++){
      setAff(ds,libre[idx].id,cl.id);
      if(useLocal)cpt[libre[idx].id]=(cpt[libre[idx].id]||0)+1;
    }
  });
}

// Calcule les semaines d'un mois : tableau de {debut, fin, label}
function getSemaines(y,m){
  const dim=new Date(y,m+1,0).getDate();
  const sems=[];let debut=1;
  for(let d=1;d<=dim;d++){
    const dow=new Date(y,m,d).getDay();
    const isLast=d===dim;
    if((dow===6||isLast)&&debut<=d){
      // Trouver le lundi de début réel (skip dimanche)
      let df=debut;while(df<=d&&new Date(y,m,df).getDay()===0)df++;
      if(df<=d)sems.push({debut:df,fin:d});
      debut=d+1;
    }
  }
  return sems;
}

function buildTableauRows(y,m,allPlan,semaines,semStart,nbSem){
  const dim=new Date(y,m+1,0).getDate();
  // Déterminer les jours à afficher
  const semsVis=semaines.slice(semStart,semStart+nbSem);
  if(!semsVis.length)return'';
  const dDebut=semsVis[0].debut;
  const dFin=semsVis[semsVis.length-1].fin;
  let rows='';
  let semIdx=semStart;
  for(let d=dDebut;d<=dFin;d++){
    const dow=new Date(y,m,d).getDay(),ds=`${y}-${pd(m+1)}-${pd(d)}`,isDim=dow===0;
    // Séparateur de semaine + en-tête semaine
    const sem=semaines[semIdx];
    if(sem&&d===sem.debut){
      const numSem=semIdx+1;
      const lbl='Sem. '+numSem+' — '+pd(sem.debut)+'/'+pd(m+1)+' → '+pd(sem.fin)+'/'+pd(m+1);
      rows+=`<tr style="background:#1E2433"><td colspan="${allPlan.length+4}" style="padding:5px 10px;font-size:10px;font-weight:700;color:#F97316;letter-spacing:.05em">${lbl}</td></tr>`;
    }
    // Fin de semaine
    if(sem&&d===sem.fin)semIdx++;

    const alert=!isDim?capaciteAlert(ds):null;
    let vis=0;
    const cells=allPlan.map(dr=>{
      if(isDim){
        // Dimanche : afficher le chip si affectation existe, sinon bouton +
        const cidDim=getAff(ds,dr.id);
        const clDim=cidDim?G.clients.find(x=>x.id===cidDim):null;
        if(clDim&&isCA(clDim.id)){
          return`<td><span class="chip" style="background:${clDim.color};color:#fff;opacity:.85" onclick="openClDD('${ds}',${dr.id},this.closest('td'))" title="Dimanche — ${clDim.nom}">${clDim.id}</span></td>`;
        }
        return`<td id="td-${ds}-${dr.id}"><span class="cell-add" onclick="openAssignDD('${ds}',${dr.id},document.getElementById('td-${ds}-${dr.id}'))" style="opacity:.5" title="Assigner ${dr.nom} (dimanche)">+</span></td>`;
      }
      const stat=gStat(ds,dr.id);
      const isAbs=stat!=='present';
      if(isAbs){
        const lbl=stat==='absent'?'abs':stat==='conge'?'cg':'ml';
        return`<td><span style="font-size:9px;color:${SC[stat]};font-weight:700">${lbl}</span></td>`;
      }
      const cid=getAff(ds,dr.id);
      const cl=cid?G.clients.find(x=>x.id===cid):null;
      const isPinned=!!pinnedClient(dr.id,ds);
      // Vérifier si le chauffeur a un camion ce jour
      const today2=new Date().toISOString().slice(0,10);
      const vehDrDay=getVehForDay(dr.id,ds);
      const noVehDay=vehDrDay==='|LIBRE'||vehDrDay.startsWith('|LIBEREJ')||!vehDrDay||vehDrDay==='—';
      // Camion hors service à partir d'aujourd'hui
      const vehDrId=vehDrDay.replace('|SWAP','').replace('|PERIOD_START','').replace('|PERIOD','');
      // Vérifier si le camion est hors service (via getVehForDay OU dr.veh direct)
      const vehDrObj=!noVehDay?G.veh.find(x=>x.id===vehDrId):null;
      const drVehObjDirect=dr.veh?G.veh.find(v=>v.id===dr.veh):null;
      const isVehHS=ds>=today2&&(
        (vehDrObj&&!vehDrObj.actif) ||
        (drVehObjDirect&&!drVehObjDirect.actif)
      );
      const extras=getAffExtra(ds,dr.id);
      // Filtrer les extras selon le filtre client actif
      const extrasVisible=extras.filter(e=>isCA(e.clientId)||e.clientId==='CUSTOM');
      const extraRows=extrasVisible.map((e,ei)=>{
        const realIdx=extras.indexOf(e);
        const ecl=G.clients.find(x=>x.id===e.clientId);
        const elabel=ecl?ecl.id:e.label||'?';
        const ecolor=ecl?ecl.color:'#9CA3AF';
        const prixTitle=e.prix!=null?' ('+e.prix.toFixed(0)+'€)':'';
        return `<span class="chip" style="background:${ecolor};color:#fff;display:block;text-align:center;margin-top:1px;opacity:.85" onclick="openExtraDD('${ds}',${dr.id},${realIdx},this.closest('td'))" title="Extra${prixTitle}">+${e.clientId==='CUSTOM'?e.label:elabel}</span>`;
      }).join('');

      if(cl&&isCA(cl.id)){
        // Tournée principale visible + ses extras
        vis++;
        const pin=isPinned?`<span class="chip-pin">&#128204;</span>`:'';
        const bloque=cl&&isBloqueClient(dr.id,cl.id);
        const warnVeh=noVehDay
          ?`<span title="Aucun camion!" style="font-size:8px">🚫</span>`
          :isVehHS?`<span title="Camion hors service!" style="font-size:8px">🔧</span>`:'';
        const bgCell=noVehDay?'#FFF7ED':isVehHS?'#FFF7ED':'';
        return`<td style="padding:2px 3px;${bgCell?'background:'+bgCell:''}" title="${noVehDay?'⚠ Sans camion':isVehHS?'🔧 Camion HS':''}">`
          +`<span class="chip" style="background:${cl.color};color:#fff;opacity:${(noVehDay||isVehHS)?.75:1};display:block;text-align:center" onclick="openClDD('${ds}',${dr.id},this.closest('td'))">${cl.id}${pin}${bloque?'🚫':''}</span>${warnVeh}`
          +(extraRows?`<div style="margin-top:1px">${extraRows}</div>`:'')
          +`</td>`;
      }else if(extrasVisible.length>0){
        // Pas de tournée principale pour ce filtre, mais des extras → afficher comme principal
        vis++;
        return`<td style="padding:2px 3px">`
          +extrasVisible.map((e,ei)=>{
            const realIdx=extras.indexOf(e);
            const ecl=G.clients.find(x=>x.id===e.clientId);
            const elabel=ecl?ecl.id:e.label||'?';
            const ecolor=ecl?ecl.color:'#9CA3AF';
            return `<span class="chip" style="background:${ecolor};color:#fff;display:block;text-align:center;margin-top:1px;opacity:.9" onclick="openExtraDD('${ds}',${dr.id},${realIdx},this.closest('td'))">+${e.clientId==='CUSTOM'?e.label:elabel}</span>`;
          }).join('')
          +`</td>`;
      }else if(cl){
        return`<td><span class="chip chip-none" onclick="openClDD('${ds}',${dr.id},this.closest('td'))" title="${cl.nom}">—</span></td>`;
      }else{
        return`<td id="td-${ds}-${dr.id}"><span class="cell-add" onclick="openAssignDD('${ds}',${dr.id},document.getElementById('td-${ds}-${dr.id}'))" title="Assigner ${dr.nom}">+</span></td>`;
      }
    }).join('');
    let totalCell='';
    if(!isDim){
      // Nb camions manquants (HS ou libérés) à partir d'aujourd'hui
      const today1b=new Date().toISOString().slice(0,10);
      const nbVehHSj=ds>=today1b?nbVehHSJour(ds):0;
      const nbSansVeh=ds>=today1b?allPlan.filter(dr=>{
        if(gStat(ds,dr.id)!=='present')return false;
        const v=getVehForDay(dr.id,ds);
        return v==='|LIBRE'||v.startsWith('|LIBEREJ')||!v||v==='—';
      }).length:0;
      const nbCamionsMq=nbVehHSj+nbSansVeh;
      // Nb chauffeurs absents (abs+congé+maladie)
      const nbChaufAbs=allPlan.filter(dr=>gStat(ds,dr.id)!=='present').length;

      // Tournées non couvertes (capacité insuffisante)
      const alertTot=capaciteAlert(ds);
      const nbManque=alertTot?alertTot.manque:0;

      let lines=`<div style="font-weight:700;font-size:11px;color:#374151">${vis}</div>`;
      if(nbManque>0)
        lines+=`<div style="font-size:9px;color:#DC2626;font-weight:700;margin-top:1px">&#9888;-${nbManque}</div>`;
      if(nbCamionsMq>0)
        lines+=`<div style="font-size:9px;color:#DC2626;font-weight:700;margin-top:1px">&#128667;-${nbCamionsMq}</div>`;
      if(nbChaufAbs>0)
        lines+=`<div style="font-size:9px;color:#EF4444;font-weight:700;margin-top:1px">&#128100;-${nbChaufAbs}</div>`;

      const hasPb=nbManque>0||nbCamionsMq>0;
      totalCell=`<td style="white-space:nowrap${hasPb?';background:#FEF2F2':''}">${lines}</td>`;
    }else{
      // Dimanche : compter les affectations manuelles
      const visDim=Object.keys(G.aff).filter(k=>k.startsWith(ds+'_')&&G.aff[k]).length;
      totalCell=visDim>0
        ?`<td style="font-weight:700;font-size:11px;color:#9CA3AF">${visDim}</td>`
        :`<td style="cursor:pointer;color:#D1D5DB;font-size:9px" onclick="openDayMo('${ds}')" title="Dimanche — cliquer pour saisie manuelle">Dim</td>`;
    }
    const hasDimAff=isDim&&Object.keys(G.aff).filter(k=>k.startsWith(ds+'_')&&G.aff[k]).length>0;
    // Alerte camion manquant sur la ligne
    const today1=new Date().toISOString().slice(0,10);
    const hasSansVeh=!isDim&&allPlan.some(dr=>{
      if(gStat(ds,dr.id)!=='present')return false;
      if(!getAff(ds,dr.id))return false;
      const v=getVehForDay(dr.id,ds);
      return v==='|LIBRE'||v.startsWith('|LIBEREJ')||!v||v==='—';
    });
    // Camion hors service à partir d'aujourd'hui
    const hasVehHS=!isDim&&ds>=today1&&nbVehHSJour(ds)>0;
    const isToday=ds===today1;
    const nbManqueRow=!isDim?(capaciteAlert(ds)?capaciteAlert(ds).manque:0):0;
    const rowBg=isToday?'background:#FFF7ED;border-left:3px solid #F97316'
      :nbManqueRow>0&&!isDim?'background:#FEF2F2'
      :hasSansVeh?'background:#FFF7ED'
      :hasVehHS?'background:#FFF7ED'
      :hasDimAff?'background:#FAFFF7':'';
    rows+=`<tr class="${isDim?'dim':''}" style="${rowBg}">
      <td class="l" style="color:${isToday?'#F97316':'#9CA3AF'};font-size:10px;font-weight:${isToday?'700':'400'}">${isToday?'●':''} ${DFR[dow]}</td>
      <td class="l" style="color:${isToday?'#F97316':'#374151'};font-weight:${isToday?'700':'600'}">${pd(d)}/${pd(m+1)}${isToday?' ◀':''}</td>
      ${cells}
      <td><span class="cell-add" onclick="openAddDD('${ds}',this.closest('td'))" title="Ajouter">+</span></td>
      ${totalCell}
    </tr>`;
  }
  return rows;
}

function rTableau(c){
  const y=G.y,m=G.m,dim=new Date(y,m+1,0).getDate();
  const allPlanFull=planDrivers();        // tous les chauffeurs planifiables
  const allPlan=planDriversVisible();     // visibles dans le tableau
  const semaines=getSemaines(y,m);
  const nbSemTotal=semaines.length;
  if(G.nbSemTbl<1)G.nbSemTbl=nbSemTotal;
  if(G.nbSemTbl>nbSemTotal)G.nbSemTbl=nbSemTotal;
  if(G.semTbl>=nbSemTotal)G.semTbl=0;

  // Filtre clients
  const fb=G.clients.map(cl=>{const on=isCA(cl.id);return `<button class="cfb${on?' on':''}" style="color:${cl.color};border-color:${on?cl.color:'#E5E7EB'};opacity:${on?1:.45}" onclick="tCA('${cl.id}')"><span style="width:8px;height:8px;border-radius:50%;background:${on?cl.color:'#9CA3AF'};display:inline-block"></span> ${cl.nom}</button>`;}).join('')+`<button class="cfb" style="color:#6B7280" onclick="clrCA()">Tous</button>`;

  // Boutons masquer/afficher chauffeurs
  const hdBtn=allPlanFull.map(d=>{
    const hidden=(G.hiddenDrivers||[]).includes(d.id);
    const col=dc(d.id);
    return `<button onclick="toggleHideDriver(${d.id})" title="${hidden?'Afficher':'Masquer'} ${d.nom}" style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:14px;font-size:10px;font-weight:700;border:1.5px solid ${hidden?'#E5E7EB':col};background:${hidden?'#F9FAFB':col};color:${hidden?'#9CA3AF':'#fff'};cursor:pointer;text-decoration:${hidden?'line-through':'none'}">
      <div style="width:14px;height:14px;border-radius:50%;background:${hidden?'#D1D5DB':col+'80'};flex-shrink:0"></div>${d.nom.split(' ')[0]}${hidden?' 👁':''}
    </button>`;
  }).join('');

  const thD=allPlan.map(d=>{
    const parts=d.nom.trim().split(/\s+/);
    const prenom=parts[0];
    const initiale=parts.length>1?' '+parts[1][0]+'.':'';
    const label=(prenom+initiale).slice(0,9);
    return `<th title="${d.nom}" style="max-width:52px;overflow:hidden"><div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:50px">${label}</div><div style="font-size:8px;color:rgba(255,255,255,.35)">${(d.veh||'').slice(0,6)}</div></th>`;
  }).join('');

  // Boutons semaine : un par semaine du mois + bouton Tout
  const canPrev=G.semTbl>0;
  const canNext=G.semTbl+G.nbSemTbl<nbSemTotal;

  const rows=buildTableauRows(y,m,allPlan,semaines,G.semTbl,G.nbSemTbl);

  // Ligne total mois
  const totParChauf=allPlan.map(dr=>{
    let n=0;
    for(let d=1;d<=dim;d++){const dow=new Date(y,m,d).getDay();if(dow===0)continue;if(getAff(`${y}-${pd(m+1)}-${pd(d)}`,dr.id))n++;}
    const max=Math.max(...allPlan.map(dx=>{let t=0;for(let d=1;d<=dim;d++){const dow2=new Date(y,m,d).getDay();if(dow2===0)continue;if(getAff(`${y}-${pd(m+1)}-${pd(d)}`,dx.id))t++;}return t;}),1);
    const pct=Math.round(n/max*100);
    const col=pct>=80?'#16A34A':pct>=50?'#D97706':'#EF4444';
    return`<th style="padding:6px 3px;text-align:center"><div style="font-size:11px;font-weight:700;color:${col}">${n}</div><div style="height:3px;background:${col};border-radius:2px;margin:2px 2px 0;opacity:.5;width:${pct}%"></div></th>`;
  }).join('');
  const tfootRow=`<tfoot><tr style="background:#F9FAFB;border-top:2px solid #E5E7EB"><th class="l" colspan="2" style="padding:6px 9px;font-size:10px;color:#6B7280;font-weight:600">TOTAL MOIS</th>${totParChauf}<th></th><th></th></tr></tfoot>`;

  // Bandeau alerte HS pour le tableau
  const vehHSTbl=G.veh.filter(v=>!v.actif);
  const alertHSTbl=vehHSTbl.length?(()=>{
    const lig=vehHSTbl.map(v=>{const dr=G.drivers.find(d=>d.veh===v.id);return dr?'<span style="background:#C2410C;color:#fff;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:700">&#128295; '+v.id+' — '+dr.nom+'</span>':'';}).filter(Boolean).join(' ');
    return lig?'<div style="background:#FEF2F2;border:1px solid #EF4444;border-radius:8px;padding:8px 14px;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="font-weight:700;color:#DC2626;font-size:12px">&#128293; Camions HS :</span>'+lig+'<a onclick="goNav(&quot;vehicules&quot;)" style="font-size:11px;color:#991B1B;margin-left:auto;cursor:pointer;text-decoration:underline">&#8594; Véhicules</a></div>':'';
  })():'';
  c.innerHTML=alertHSTbl+`
    <div class="ptitle">Tableau des Affectations</div>
    <div class="psub">Chip = client · &#128204; = règle fixe · ⚠ = tournées non couvertes</div>
    <div class="cf">${fb}</div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap;padding:8px 10px;background:#F9FAFB;border-radius:8px;border:1px solid #E5E7EB">
      <span style="font-size:10px;font-weight:700;color:#6B7280;flex-shrink:0">&#128064; Chauffeurs :</span>
      ${hdBtn}
      <button onclick="showAllDrivers()" style="margin-left:auto;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;border:1px solid #D1D5DB;background:#fff;color:#374151;cursor:pointer">Tout afficher</button>
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:9px;flex-wrap:wrap">
      <button class="cnb" onclick="calM2(-1)">&#8249;</button>
      <div style="font-size:14px;font-weight:700">${MFR[m]} ${y}</div>
      <button class="cnb" onclick="calM2(1)">&#8250;</button>
      <div style="width:1px;height:20px;background:#E5E7EB;margin:0 6px"></div>
      ${semaines.map((s,i)=>`<button onclick="goSem(${i})" style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;border:1px solid ${G.semTbl===i&&G.nbSemTbl===1?'#F97316':'#D1D5DB'};background:${G.semTbl===i&&G.nbSemTbl===1?'#F97316':'#fff'};color:${G.semTbl===i&&G.nbSemTbl===1?'#fff':'#374151'};cursor:pointer">S${i+1}</button>`).join('')}
      <button onclick="showAllSem()" style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;border:1px solid ${G.nbSemTbl===nbSemTotal?'#1E2433':'#D1D5DB'};background:${G.nbSemTbl===nbSemTotal?'#1E2433':'#fff'};color:${G.nbSemTbl===nbSemTotal?'#fff':'#374151'};cursor:pointer">Tout</button>
      <button class="btn btn-out btn-sm" style="margin-left:auto" onclick="dispatchMois();goNav('tableau')">&#9889; Re-dispatcher (demain+)</button>
      <button class="btn btn-out btn-sm" onclick="exportTableauExcel()" style="background:#217346;color:#fff;border:none">&#128202; Exporter Excel</button>
    </div>
    <div class="tbl-outer"><table class="aff-table">
      <thead><tr><th class="l">J</th><th class="l">Date</th>${thD}<th>+</th><th>Tot</th></tr></thead>
      <tbody>${rows}</tbody>
      ${tfootRow}
    </table></div>`;
}
function calM2(d){if(d<0){if(G.m===0){G.m=11;G.y--;}else G.m--;}else{if(G.m===11){G.m=0;G.y++;}else G.m++;}G.semTbl=0;rTableau(document.getElementById('content'));}
function goSem(i){G.semTbl=i;G.nbSemTbl=1;rTableau(document.getElementById('content'));}
function toggleHideDrv(id){
  if(!G.hiddenDrvs)G.hiddenDrvs=[];
  if(G.hiddenDrvs.includes(id))G.hiddenDrvs=G.hiddenDrvs.filter(x=>x!==id);
  else G.hiddenDrvs.push(id);
  dbSave();rTableau(document.getElementById('content'));
}
function showAllDrvs(){G.hiddenDrvs=[];dbSave();rTableau(document.getElementById('content'));}
function hideAllDrvs(){G.hiddenDrvs=planDrivers().map(d=>d.id);dbSave();rTableau(document.getElementById('content'));}
function toggleHideDriver(id){
  if(!G.hiddenDrivers)G.hiddenDrivers=[];
  if(G.hiddenDrivers.includes(id))G.hiddenDrivers=G.hiddenDrivers.filter(x=>x!==id);
  else G.hiddenDrivers.push(id);
  dbSave();rTableau(document.getElementById('content'));
}
function showAllDrivers(){G.hiddenDrivers=[];dbSave();rTableau(document.getElementById('content'));}
function navSem(d){
  const sems=getSemaines(G.y,G.m);
  G.semTbl=Math.max(0,Math.min(G.semTbl+d,sems.length-G.nbSemTbl));
  rTableau(document.getElementById('content'));
}
function showAllSem(){
  const sems=getSemaines(G.y,G.m);
  G.nbSemTbl=sems.length;G.semTbl=0;
  rTableau(document.getElementById('content'));
}
function tCA(id){if(G.ac.includes(id))G.ac=G.ac.filter(x=>x!==id);else G.ac.push(id);dbSave();rTableau(document.getElementById('content'));}
function clrCA(){G.ac=[];dbSave();rTableau(document.getElementById('content'));}

function openVehDD(id,btn){
  closeDD();
  const drv=G.drivers.find(d=>d.id===id);
  const dd=document.createElement('div');dd.className='vdd';
  const n=document.createElement('div');n.className='vo'+(drv.veh?'':' sel');
  n.innerHTML='<span class="vo-p" style="color:#9CA3AF">— Aucun —</span>';
  n.onclick=e=>{e.stopPropagation();drv.veh=null;closeDD();dbSave();rChauffeurs(document.getElementById('content'));};
  dd.appendChild(n);
  const sep=document.createElement('div');sep.className='vo-sep';sep.textContent='Vehicules';dd.appendChild(sep);
  [...G.veh].sort((a,b)=>{
    if(a.id===drv.veh)return -1;if(b.id===drv.veh)return 1;
    const aO=G.drivers.find(d=>d.veh===a.id&&d.id!==id);
    const bO=G.drivers.find(d=>d.veh===b.id&&d.id!==id);
    if(!aO&&bO)return -1;if(aO&&!bO)return 1;
    return a.id.localeCompare(b.id);
  }).forEach(v=>{
    const ow=G.drivers.find(d=>d.veh===v.id&&d.id!==id),iC=v.id===drv.veh;
    const op=document.createElement('div');op.className='vo'+(iC?' sel':'');
    const statusBadge=!v.actif?'<span style="font-size:9px;color:#EF4444;font-weight:700">&#9888; Hors service</span>':'';
    const bg=iC?'<span class="vo-att">Attribue</span>':ow?'<span class="vo-warn">&#9888; '+ow.nom+'</span>':'<span class="vo-free">Libre</span>';
    op.innerHTML='<span class="vo-p">'+v.id+(iC?' ✓':'')+'</span>'+bg+statusBadge;
    op.onclick=e=>{e.stopPropagation();drv.veh=v.id;logVehAssign(id,v.id);closeDD();dbSave();rChauffeurs(document.getElementById('content'));toast(v.id+' ✓');};
    dd.appendChild(op);
  });
  btn.style.position='relative';btn.appendChild(dd);regDD(dd);
}

function attribuerCamionPeriode(driverId){
  const dr=G.drivers.find(d=>d.id===driverId);if(!dr)return;
  const today=new Date().toISOString().slice(0,10);
  // Grouper : actifs d'abord, puis hors service
  const vehActifs=G.veh.filter(v=>v.actif);
  const vehHors=G.veh.filter(v=>!v.actif);
  const makeOpt=v=>{
    const ow=G.drivers.find(d=>d.veh===v.id&&d.id!==driverId);
    const label=v.id+(ow?' ('+ow.nom+')':'')+(v.actif?'':' — Hors service');
    return '<option value="'+v.id+'"'+(v.id===dr.veh?' selected':'')+'>'+label+'</option>';
  };
  const vehOpts=(vehActifs.length?'<optgroup label="Actifs">'+vehActifs.map(makeOpt).join('')+'</optgroup>':'')
    +(vehHors.length?'<optgroup label="Hors service">'+vehHors.map(makeOpt).join('')+'</optgroup>':'');
  showModal('&#128667; Attribuer camion — '+dr.nom,'',
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'
      +'<div class="fg"><label class="fl">Camion</label><select class="fs" id="ap-veh" onchange="checkAttrPeriode()">'+vehOpts+'</select></div>'
      +'<div class="fg" style="display:flex;flex-direction:column;justify-content:flex-end"><label style="font-size:11px;color:#6B7280;font-weight:600;margin-bottom:4px">Statut actuel</label>'
        +'<div style="font-size:12px;font-weight:700;color:'+(dr.veh?'#16A34A':'#EF4444')+'">&#128667; '+(dr.veh||'Aucun camion')+'</div>'
      +'</div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px">'
      +'<div class="fg"><label class="fl">Date début</label><input class="fi" type="date" id="ap-d1" value="'+today+'" onchange="checkAttrPeriode()"></div>'
      +'<div class="fg"><label class="fl">Date fin</label><input class="fi" type="date" id="ap-d2" value="'+today+'" onchange="checkAttrPeriode()"></div>'
    +'</div>'
    +'<div class="fg"><label class="fl">Note (optionnel)</label><input class="fi" id="ap-note" placeholder="Remplacement, mission..."></div>'
    +'<div id="ap-check"></div>',
    '<button class="btn btn-out btn-sm" onclick="closeMo()">Annuler</button>'
    +'<button class="btn btn-or btn-sm" id="ap-btn" onclick="svAttrPeriode('+driverId+')">Attribuer</button>');
  setTimeout(checkAttrPeriode,50);
}

function checkAttrPeriode(){
  var vehId=document.getElementById('ap-veh').value;
  var d1=document.getElementById('ap-d1').value;
  var d2=document.getElementById('ap-d2').value;
  var box=document.getElementById('ap-check');
  var btn=document.getElementById('ap-btn');
  if(!vehId||!d1||!d2||d2<d1){box.innerHTML='<div class="attr-err">&#9888; Dates invalides</div>';btn.disabled=true;btn.style.opacity='.5';return;}
  btn.disabled=false;btn.style.opacity='1';
  var warns=[];
  var vehObj=G.veh.find(function(v){return v.id===vehId;});
  // Vérif 1 : véhicule hors service
  if(vehObj&&!vehObj.actif){
    warns.push('<div class="attr-warn">&#128295; Ce véhicule est <strong>hors service</strong> — attribution possible pour la période de réparation. Il repassera actif lors de la réattribution.</div>');
  }
  // Vérif 2 : déjà attribué à un autre chauffeur
  var autreChauf=G.drivers.find(function(d){return d.veh===vehId&&d.id!==parseInt(document.getElementById('ap-veh').closest('.modal').getAttribute('data-did')||0);});
  // Chercher via vehPeriod si attribué sur cette période
  var conflict=(G.vehPeriod||[]).filter(function(p){
    return p.vehId===vehId&&p.debut<=d2&&p.fin>=d1;
  });
  conflict.forEach(function(p){
    var dr=G.drivers.find(function(d){return d.id===p.driverId;});
    warns.push('<div class="attr-warn">&#9888; <strong>'+(dr?dr.nom:'Chauffeur')+
      '</strong> a ce camion du '+fmtDate(p.debut)+' au '+fmtDate(p.fin)+'</div>');
  });
  // Vérif 3 : chauffeur absent/congé sur la période
  var drId=parseInt(document.getElementById('ap-veh').closest('form')||0);
  // On va chercher depuis l'id stocké dans la modale
  var da=new Date(d1+'T00:00:00'),db=new Date(d2+'T00:00:00');
  var absJours=[];
  for(var dt=new Date(da);dt<=db;dt.setDate(dt.getDate()+1)){
    var ds=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
    // On ne peut pas facilement récupérer driverId ici — on le fait à la validation
  }
  box.innerHTML=warns.join('')+(warns.length===0?'<div class="attr-ok">&#10003; Aucun conflit détecté</div>':'');
}

function svAttrPeriode(driverId){
  var vehId=document.getElementById('ap-veh').value;
  var d1=document.getElementById('ap-d1').value;
  var d2=document.getElementById('ap-d2').value;
  var note=document.getElementById('ap-note').value.trim();
  if(!vehId||!d1||!d2||d2<d1){toast('Données invalides');return;}
  var dr=G.drivers.find(function(d){return d.id===driverId;});
  var ts=nowTs();
  // Vérifier absences/congés sur la période
  var da=new Date(d1+'T00:00:00'),db=new Date(d2+'T00:00:00');
  var joursAbs=[];
  for(var dt=new Date(da);dt<=db;dt.setDate(dt.getDate()+1)){
    var ds=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
    var st=gStat(ds,driverId);
    if(st!=='present')joursAbs.push(fmtDate(ds)+' ('+SL[st]+')');
  }
  if(joursAbs.length>0){
    if(!confirm('Attention : '+dr.nom+' absent sur '+joursAbs.length+' jours. Continuer ?'))return;
  }
  // Enregistrer l'attribution de période
  if(!G.vehPeriod)G.vehPeriod=[];
  G.vehPeriod.push({driverId:driverId,vehId:vehId,debut:d1,fin:d2,note:note,ts:ts});
  // Mettre à jour le camion actuel si la période inclut aujourd'hui
  var today=new Date().toISOString().slice(0,10);
  if(d1<=today&&today<=d2){
    dr.veh=vehId;
    logVehAssign(driverId,vehId);
  }
  // Enregistrer dans l'historique
  if(!G.vehHistory)G.vehHistory=[];
  G.vehHistory.push({
    type:'assign',ts:ts,veh:vehId,driverId:driverId,
    desc:(dr?dr.nom:'?')+' ← '+vehId+' du '+fmtDate(d1)+' au '+fmtDate(d2)+(note?' — '+note:''),
    entretienType:null
  });
  // Si le véhicule était hors service et que la période commence aujourd'hui ou avant → le remettre actif
  const vehObj2=G.veh.find(function(v){return v.id===vehId;});
  if(vehObj2&&!vehObj2.actif&&d1<=today){
    vehObj2.actif=true;
    toast('Camion '+vehId+' remis en service et attribué du '+fmtDate(d1)+' au '+fmtDate(d2)+' ✓');
  } else {
    toast('Camion attribué du '+fmtDate(d1)+' au '+fmtDate(d2)+' ✓');
  }
  closeMo();dbSave();rChauffeurs(document.getElementById('content'));
}

function exportDEF(){
  var q="'",nl="\n";
  var lines=G.drivers.map(function(d){
    return '    {id:'+d.id+',nom:'+q+d.nom+q+',veh:'+(d.veh?q+d.veh+q:'null')+',plan:'+d.plan+(d.reserve?',reserve:true':'')+'}';
  });
  var vehList=G.veh.map(function(v){return q+v.id+q;});
  var out='const DEF={'+nl+'  drivers:['+nl+lines.join(','+nl)+nl+'  ],'+nl+'  veh:['+vehList.join(',')+'],'+nl+'  nid:'+G.nid+nl+'};';
  var box=document.getElementById('modal-box');
  box.innerHTML='<div class="modal-title">Exporter base de donnees</div>'
    +'<div style="font-size:11px;color:#6B7280;margin-bottom:8px">Configuration actuelle chauffeurs + camions. Copiez ce code.</div>'
    +'<textarea id="def-ta" style="width:100%;height:200px;font-family:monospace;font-size:10px;padding:8px;border:1px solid #D1D5DB;border-radius:6px" onclick="this.select()" readonly></textarea>'
    +'<div class="mfoot"><button class="btn btn-out btn-sm" onclick="closeMo()">Fermer</button>'
    +'<button class="btn btn-or btn-sm" onclick="cpDef()">Copier</button></div>';
  document.getElementById('modal-bg').style.display='flex';
  document.getElementById('def-ta').value=out;
}

function svRegleOrdre(idx){
  const clientId=document.getElementById('ord-cl').value;

  const ordre=ordreStr.split(',').map(s=>s.trim()).filter(Boolean);
  if(!ordre.length){toast('Ajoutez au moins un chauffeur');return;}
  const jours=[...document.querySelectorAll('.ord-dow:checked')].map(x=>parseInt(x.value));

  const obj={clientId,ordre,jours};
  if(idx!=null&&idx>=0)G.reglesOrdre[idx]=obj;

  toast('Règle de priorité enregistrée ✓');

function buildEntretiensCard(vehId){
  const ents=(G.entretiens||[]).filter(e=>e.vehId===vehId);
  const today=new Date().toISOString().slice(0,10);
  const in30=new Date(Date.now()+30*24*3600000).toISOString().slice(0,10);
  let rows='';
  ents.forEach((e,ei)=>{
    const realIdx=(G.entretiens||[]).indexOf(e);
    const isDue=e.prochaine&&e.prochaine<=today;
    const isAlert=e.prochaine&&e.prochaine<=in30&&!isDue;
    const bg=isDue?'#FEF2F2':isAlert?'#FFF7ED':'#F9FAFB';
    const border=isDue?'1px solid #FCA5A5':isAlert?'1px solid #FED7AA':'1px solid #E5E7EB';
    const icon=e.type==='vidange'?'&#128718;':'&#128295;';
    const label=e.type==='vidange'?'Vidange':'Plaquettes frein';
    const badge=isDue?'<span style="background:#DC2626;color:#fff;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700">RETARD</span>'
      :isAlert?'<span style="background:#F97316;color:#fff;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700">BIENTOT</span>':'';
    // Bouton valider : masque la notification (marque comme vu)
    const isAcknowledged=e.acknowledged||false;
    const showBadge=(isDue||isAlert)&&!isAcknowledged;
    const rowBg=isAcknowledged?'#F9FAFB':bg;
    const rowBorder=isAcknowledged?'1px solid #E5E7EB':border;
    rows+='<div style="display:flex;align-items:center;gap:6px;padding:5px 7px;background:'+rowBg+';border:'+rowBorder+';border-radius:6px;margin-bottom:3px">'
      +'<span>'+icon+'</span>'
      +'<div style="flex:1;min-width:0">'
        +'<div style="font-size:11px;font-weight:700">'+label+(e.note?' <span style="font-weight:400;color:#6B7280">— '+e.note+'</span>':'')+'</div>'
        +'<div style="font-size:10px;color:#6B7280">'
          +(e.derniere?'Derni&#232;re: '+fmtDate(e.derniere)+'  ':'')
          +(e.prochaine?'Prochaine: <strong style="color:'+(isDue&&!isAcknowledged?'#DC2626':isAlert&&!isAcknowledged?'#F97316':'#374151')+'">'+fmtDate(e.prochaine)+'</strong>':'')
        +'</div>'
      +'</div>'
      +(showBadge?badge:'')
      // Bouton Valider (✓) : marque comme vu, supprime la notification
      +(showBadge?'<button style="width:22px;height:22px;border-radius:50%;border:2px solid #16A34A;background:#F0FDF4;color:#16A34A;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0" onclick="ackEntretien('+realIdx+')" title="Marquer comme vu">&#10003;</button>':'')
      +'<button class="ab ab-ed" onclick="editEntretien('+realIdx+')" title="Modifier">&#9998;</button>'
      +'<button style="width:22px;height:22px;border-radius:50%;border:none;background:#FEF2F2;color:#DC2626;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0" onclick="delEntretien('+realIdx+')" title="Supprimer">&#10005;</button>'
    +'</div>';
  });
  return '<div style="margin-top:8px;padding-top:8px;border-top:1px solid #F3F4F6">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">'
      +'<span style="font-size:11px;font-weight:700;color:#374151">&#128295; Entretiens</span>'
      +'<button onclick="addEntretien(&quot;'+vehId+'&quot;)" style="padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;border:1px solid #D1D5DB;background:#fff;color:#374151;cursor:pointer">+ Ajouter</button>'
    +'</div>'
    +(rows||'<div style="font-size:11px;color:#9CA3AF">Aucun entretien planifi&#233;</div>')
  +'</div>';
}

function sendEntretienWA(vehId,idx){
  const e=(G.entretiens||[])[idx];if(!e)return;
  const dr=G.drivers.find(d=>d.veh===vehId);
  if(!dr||!dr.wa){toast('Num\u00e9ro WhatsApp manquant pour ce chauffeur');return;}
  const typeLabel=e.type==='vidange'?'vidange huile moteur':'remplacement des plaquettes de frein';
  const dateLabel=e.prochaine?fmtDate(e.prochaine):'prochainement';
  const msg='Bonjour '+dr.nom.split(' ')[0]+' \uD83D\uDC4B\n\n'
    +'\uD83D\uDD27 *Rappel entretien — '+vehId+'*\n'
    +'La '+typeLabel+' de votre v\u00e9hicule est pr\u00e9vue pour le *'+dateLabel+'*.\n'
    +(e.note?'\uD83D\uDCCB Note : '+e.note+'\n':'')
    +'\nMerci de confirmer la prise en charge.\n\u2014 Mydka Planning';
  const phone=dr.wa.replace(/[^0-9]/g,'');
  window.open('https://wa.me/'+phone+'?text='+encodeURIComponent(msg),'_blank');
}

// Vérification automatique J-2 : envoyer rappel si entretien dans 2 jours
function checkEntretiensJ2(){
  if(!G.entretiens||!G.entretiens.length)return;
  const today=new Date();today.setHours(0,0,0,0);
  const todayStr=today.toISOString().slice(0,10);
  const j2=new Date(today);j2.setDate(j2.getDate()+2);
  const j2str=j2.toISOString().slice(0,10);
  const dues=(G.entretiens||[]).filter(e=>{
    if(!e.prochaine||e.prochaine!==j2str)return false;
    if(e.autoNotifSent===todayStr)return false;
    const dr=G.drivers.find(d=>d.veh===e.vehId);
    return dr&&dr.wa;
  });
  if(!dues.length)return;
  const lignes=dues.map(e=>{
    const dr=G.drivers.find(d=>d.veh===e.vehId);
    const icon=e.type==='vidange'?'&#128718;':'&#128295;';
    const label=e.type==='vidange'?'Vidange':'Plaquettes frein';
    return '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #F3F4F6">'
      +'<span>'+icon+'</span>'
      +'<div style="flex:1"><strong>'+e.vehId+'</strong> — '+label+'<br>'
      +'<span style="font-size:11px;color:#6B7280">Chauffeur : '+dr.nom+' · Date : <strong style="color:#F97316">'+fmtDate(e.prochaine)+'</strong></span>'
      +'</div></div>';
  }).join('');
  const body='<div style="background:#FFF7ED;border:1px solid #FED7AA;border-radius:8px;padding:10px;margin-bottom:12px">'
    +'<div style="font-weight:700;color:#C2410C;margin-bottom:8px">&#9200; Entretiens dans 2 jours :</div>'
    +lignes+'</div>'
    +'<div style="font-size:12px;color:#6B7280;margin-top:8px">&#128241; Un message WhatsApp sera ouvert pour chaque chauffeur.</div>';
  window._j2Indices=dues.map(e=>(G.entretiens||[]).findIndex(x=>x===e));
  window._j2todayStr=todayStr;
  showModal('&#128241; Rappels J-2','',body,
    '<button class="btn btn-out btn-sm" onclick="closeMo()">Plus tard</button>'
    +'<button class="btn btn-or btn-sm" onclick="confirmSendJ2()">&#10003; Envoyer</button>');
}
function confirmSendJ2(){
  const indices=window._j2Indices||[];
  const todayStr=window._j2todayStr||new Date().toISOString().slice(0,10);
  indices.forEach(idx=>{
    if(idx<0||!G.entretiens[idx])return;
    const e=G.entretiens[idx];
    sendEntretienWA(e.vehId,idx);
    G.entretiens[idx].autoNotifSent=todayStr;
  });
  dbSave();closeMo();
  toast('&#128241; '+indices.length+' rappel(s) envoyé(s) ✓');
}

function confAttribuerVehAChauf(vehId){
  var driverId=parseInt(document.getElementById('avc-drv').value);
  var d1=document.getElementById('avc-d1').value;
  var d2=document.getElementById('avc-d2').value;
  var note=document.getElementById('avc-note').value.trim();
  var dr=G.drivers.find(function(d){return d.id===driverId;});
  if(!dr||!d1){toast('Données manquantes');return;}
  var vehObj=G.veh.find(function(v){return v.id===vehId;});
  var today=new Date().toISOString().slice(0,10);
  // Remettre en service si hors service
  if(vehObj&&!vehObj.actif){vehObj.actif=true;}
  // Attribution immédiate si début <= aujourd'hui
  if(d1<=today){dr.veh=vehId;}
  // Enregistrer dans vehPeriod si une fin est spécifiée
  if(d2&&d2>=d1){
    if(!G.vehPeriod)G.vehPeriod=[];
    G.vehPeriod.push({driverId:driverId,vehId:vehId,debut:d1,fin:d2,note:note,ts:nowTs()});
  }
  // Historique
  if(!G.vehHistory)G.vehHistory=[];
  G.vehHistory.push({type:'assign',ts:nowTs(),veh:vehId,driverId:driverId,
    desc:dr.nom+' ← '+vehId+(d2?' du '+fmtDate(d1)+' au '+fmtDate(d2):'')+(note?' — '+note:''),
    entretienType:null});
  closeMo();dbSave();rVehicules(document.getElementById('content'));
  toast(vehId+' attribue a '+dr.nom+' ✓');
}

function fmtDate(ds){
  const d=new Date(ds+'T00:00:00');
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
}
function nowTs(){
  const n=new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')
    +'T'+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
function fmtTs(ts){
  if(!ts)return'—';
  const d=new Date(ts);
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear()
    +' '+String(d.getHours()).padStart(2,'0')+'h'+String(d.getMinutes()).padStart(2,'0');
}

function svConge(){
  const driverId=parseInt(document.getElementById('cg-drv').value);
  const type=document.getElementById('cg-type').value;
  const debut=document.getElementById('cg-d1').value;
  const fin=document.getElementById('cg-d2').value;
  if(!debut||!fin){toast('Dates requises');return;}
  if(fin<debut){toast('La date de fin doit être après le début');return;}
  if(!G.conges)G.conges=[];
  G.conges.push({driverId,type,debut,fin});
  // Redispatcher tous les jours concernés
  redispatchPeriode(debut,fin);
  closeMo();dbSave();rConges(document.getElementById('content'));
  const dr=G.drivers.find(d=>d.id===driverId);
  toast((dr?dr.nom:'Chauffeur')+' — congé enregistré et planning mis à jour ✓');
}

function delConge(i){
  const cg=G.conges[i];
  const dr=G.drivers.find(d=>d.id===cg.driverId);
  showModal('Supprimer ce congé ?',

    +'&#9432; Les jours <strong>passés et aujourd&#39;hui</strong> ne seront pas re-dispatchés.<br>'
    +'Seuls les jours futurs non protégés manuellement seront mis à jour.'
    +'</div>',
    '<button class="btn btn-out btn-sm" onclick="closeMo()">Annuler</button>'
    +'<button class="btn btn-sm" style="background:#DC2626;color:#fff" onclick="confDelConge('+i+')">Supprimer</button>');

function confDelConge(i){
  const cg=G.conges[i];
  G.conges.splice(i,1);
  redispatchPeriode(cg.debut,cg.fin);
  closeMo();dbSave();rConges(document.getElementById('content'));
  toast('Congé supprimé ✓');
}

function redispatchPeriode(debut,fin){
  const d1=new Date(debut+'T00:00:00'),d2=new Date(fin+'T00:00:00');
  const todayStr=new Date().toISOString().slice(0,10);
  const manualDays=G.manualDays||{};
  for(let d=new Date(d1);d<=d2;d.setDate(d.getDate()+1)){
    if(d.getDay()===0)continue; // dimanche ignoré
    const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(ds<=todayStr)continue;   // passé/aujourd'hui préservé
    if(manualDays[ds])continue; // jour modifié manuellement préservé
    autoDispatch(ds);
  }
}

    <div class="psub">Envoyer le planning mensuel individuel à chaque chauffeur</div></div>
    <button class="btn btn-or" onclick="waAll()">&#128241; Envoyer à tous</button>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px">${cards}</div>
  <div id="wa-preview-zone"></div>`;
}

function buildWaMessage(driverId){
  const dr=G.drivers.find(d=>d.id===driverId);
  if(!dr)return'';
  const y=G.y,m=G.m,dim=new Date(y,m+1,0).getDate();
  const MM=String(m+1).padStart(2,'0');
  let lines=[];
  lines.push('🚛 *Planning '+MFR[m]+' '+y+'*');
  lines.push('👤 *'+dr.nom+'*');
  lines.push('─────────────────');
  // Grouper par semaine
  let semaine=[];
  let numSem=0;
  for(let d=1;d<=dim;d++){
    const dow=new Date(y,m,d).getDay();
    if(dow===1&&semaine.length>0){
      numSem++;
      lines.push('');
      lines.push('*── Semaine '+numSem+' ──*');
      semaine.forEach(l=>lines.push(l));
      semaine=[];
    }
    if(dow===0)continue;
    const ds=y+'-'+MM+'-'+String(d).padStart(2,'0');
    const stat=gStat(ds,dr.id);
    const aff=getAff(ds,dr.id);
    const cl=aff?G.clients.find(x=>x.id===aff):null;
    const DD=String(d).padStart(2,'0');
    const jourLabel=DFR[dow]+' '+DD+'/'+MM;
    let statLabel;
    if(stat==='maladie')     statLabel='Maladie';
    else if(stat==='conge')  statLabel='Conge';
    else if(stat==='absent') statLabel='Absent';
    else if(cl)              statLabel=cl.nom;
    else                     statLabel='Sans tournee';
    const dot = (stat==='maladie'||stat==='conge'||stat==='absent') ? '  ' : '> ';
    semaine.push(dot+jourLabel+'  ->  '+statLabel);
  }
  if(semaine.length>0){
    numSem++;
    lines.push('');
    lines.push('*── Semaine '+numSem+' ──*');
    semaine.forEach(l=>lines.push(l));
  }
  lines.push('');
  lines.push('─────────────────');
  lines.push('_Mydka Planning_');
  return lines.join('\n');
}

function previewWa(id){
  var dr=G.drivers.find(function(d){return d.id===id;});
  var msg=buildWaMessage(id);
  var zone=document.getElementById('wa-preview-zone');
  var waBtn=dr.wa
    ? '<div style="margin-top:10px"><button class="wa-btn" onclick="openWa('+id+')">&#128241; Ouvrir WhatsApp</button></div>'
    : '<div style="color:#EF4444;font-size:12px;margin-top:8px">&#9888; Numero non renseigne</div>';
  var html='<div style="background:#fff;border-radius:10px;border:1px solid #E5E7EB;padding:16px;margin-top:14px">';
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
  html+='<div style="font-weight:700;font-size:13px">Apercu '+dr.nom+'</div>';
  html+='<button class="btn btn-out btn-sm" onclick="closeWaPreview()">&#10005;</button>';
  html+='</div>';
  html+='<pre style="white-space:pre-wrap;font-size:12px;line-height:1.6;background:#F9FAFB;padding:12px;border-radius:8px;border:1px solid #E5E7EB">'+msg+'</pre>';
  html+=waBtn;
  html+='</div>';
  zone.innerHTML=html;
}
function closeWaPreview(){document.getElementById('wa-preview-zone').innerHTML='';}

function openWa(id){
  const dr=G.drivers.find(d=>d.id===id);
  if(!dr||!dr.wa){toast('Numéro WhatsApp non renseigné');return;}
  // buildWaMessage retourne un string avec de vrais \n
  // encodeURIComponent gère tout seul les \n, emojis, caractères spéciaux
  const msg=buildWaMessage(id);
  const num=dr.wa.replace(/[^0-9+]/g,'');
  window.open('https://wa.me/'+num+'?text='+encodeURIComponent(msg),'_blank');
}

function waAll(){
  const haWa=G.drivers.filter(d=>d.plan&&d.wa);
  if(!haWa.length){toast('Aucun numéro WhatsApp renseigné');return;}
  let i=0;
  function next(){
    if(i>=haWa.length)return;
    openWa(haWa[i].id);
    i++;
    if(i<haWa.length)setTimeout(next,1200);
  }
  next();
  toast('Ouverture WhatsApp pour '+haWa.length+' chauffeurs...');
}
