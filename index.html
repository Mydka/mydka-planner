function rTarifs(c){
  const y=G.y,m=G.m,MM=String(m+1).padStart(2,'0');
  const dim=new Date(y,m+1,0).getDate();
  if(!G.tarifs)G.tarifs={};
  const planDrvs=planDrivers();
  const semaines=getSemaines(y,m);
  const nbSemTotal=semaines.length;
  if(window._tarifSem===undefined)window._tarifSem=0;
  if(window._tarifNbSem===undefined)window._tarifNbSem=nbSemTotal;
  if(window._tarifNbSem>nbSemTotal)window._tarifNbSem=nbSemTotal;
  if(window._tarifSem>=nbSemTotal)window._tarifSem=0;
  if(!window._tarifCl)window._tarifCl=null; // null = tous les clients

  // ── Fonctions calcul ──────────────────────────────────────────────────────
  function getTours(driverId, clientId, ds){
    let n=0;
    if(getAff(ds,driverId)===clientId)n++;
    getAffExtra(ds,driverId).forEach(e=>{if(e.clientId===clientId)n++;});
    return n;
  }
  function getToursDetail(driverId, clientId, ds){
    // Retourne {normal: 0|1, extras: []} pour distinguer normale et supplémentaires
    const normal=getAff(ds,driverId)===clientId?1:0;
    const extras=getAffExtra(ds,driverId).filter(e=>e.clientId===clientId);
    return {normal, extras};
  }
  function getTarifJour(driverId, ds){
    let tot=0;
    G.clients.forEach(cl=>{
      const t=parseFloat(G.tarifs[cl.id])||0;
      const detail=getToursDetail(driverId,cl.id,ds);
      tot+=detail.normal*t;
      detail.extras.forEach(ex=>{tot+=ex.prix!=null?ex.prix:(t>0?t*1.2:0);});
    });
    // Extras custom (client inconnu)
    getAffExtra(ds,driverId).filter(e=>e.clientId==='CUSTOM').forEach(ex=>{
      tot+=ex.prix||0;
    });
    return tot;
  }
  function getTarifMois(driverId){
    let tot=0;
    for(let d=1;d<=dim;d++){
      const ds=y+'-'+MM+'-'+String(d).padStart(2,'0');
      tot+=getTarifJour(driverId,ds);
    }
    return tot;
  }

  // ── Filtre client actif ───────────────────────────────────────────────────
  const clFilter=window._tarifCl;
  const fb=`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;align-items:center">
    <span style="font-size:11px;font-weight:700;color:#6B7280">Filtrer :</span>
    <button onclick="window._tarifCl=null;rTarifs(document.getElementById('content'))" style="padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;border:1px solid ${!clFilter?'#1E2433':'#D1D5DB'};background:${!clFilter?'#1E2433':'#fff'};color:${!clFilter?'#fff':'#374151'};cursor:pointer">Tous</button>
    ${G.clients.map(cl=>`<button onclick="window._tarifCl='${cl.id}';rTarifs(document.getElementById('content'))" style="padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;border:1px solid ${clFilter===cl.id?cl.color:'#E5E7EB'};background:${clFilter===cl.id?cl.color:'#fff'};color:${clFilter===cl.id?'#fff':cl.color};cursor:pointer">${cl.nom}</button>`).join('')}
  </div>`;

  // ── En-têtes chauffeurs ───────────────────────────────────────────────────
  const thD=planDrvs.map(dr=>`<th title="${dr.nom}" style="width:52px;min-width:52px">
    <div>${prenomInitiale(dr.nom)}</div>
    <div style="font-size:8px;color:rgba(255,255,255,.4);margin-top:1px">${getTarifMois(dr.id)>0?getTarifMois(dr.id).toFixed(0)+'€':''}</div>
  </th>`).join('');

  // ── Lignes jours ──────────────────────────────────────────────────────────
  const semsVis=semaines.slice(window._tarifSem,window._tarifSem+window._tarifNbSem);
  const dDebut=semsVis.length?semsVis[0].debut:1;
  const dFin=semsVis.length?semsVis[semsVis.length-1].fin:dim;
  let rows='',semIdx=window._tarifSem;
  for(let d=dDebut;d<=dFin;d++){
    const dow=new Date(y,m,d).getDay();
    const ds=y+'-'+MM+'-'+String(d).padStart(2,'0');
    const isDim=dow===0;
    // Séparateur semaine
    const sem=semaines[semIdx];
    if(sem&&d===sem.debut){
      rows+=`<tr style="background:#1E2433"><td colspan="${planDrvs.length+4}" style="padding:5px 10px;font-size:10px;font-weight:700;color:#F97316">Sem. ${semIdx+1} — ${pd(sem.debut)}/${MM} → ${pd(sem.fin)}/${MM}</td></tr>`;
    }
    if(sem&&d===sem.fin)semIdx++;

    // Cellules chauffeurs
    const cells=planDrvs.map(dr=>{
      if(isDim)return`<td style="background:#FAFAFA;color:#D1D5DB;font-size:9px;text-align:center">—</td>`;
      const stat=gStat(ds,dr.id);
      if(stat!=='present')return`<td style="text-align:center"><span style="font-size:9px;color:${SC[stat]};font-weight:700">${stat==='absent'?'abs':stat==='conge'?'cg':'ml'}</span></td>`;
      // Calculer les tournées et le montant selon le filtre
      let chips='',montant=0;
      // Tournées clients connus
      G.clients.forEach(cl=>{
        if(clFilter&&cl.id!==clFilter)return;
        const detail=getToursDetail(dr.id,cl.id,ds);
        if(detail.normal===0&&detail.extras.length===0)return;
        const t=parseFloat(G.tarifs[cl.id])||0;
        // Tournée normale : chip vert "FO XX€" — utiliser prix custom si disponible
        if(detail.normal>0){
          const affPrixEntry=(G.affPrix||{})[ds+'_'+dr.id];
          const prixNormal=(affPrixEntry&&affPrixEntry.clientId===cl.id&&affPrixEntry.prix!=null)?affPrixEntry.prix:t;
          montant+=prixNormal;
          chips+=`<div style="background:${cl.color};color:#fff;border-radius:3px;font-size:8px;font-weight:700;padding:1px 4px;margin-bottom:1px;text-align:center">${cl.id}${prixNormal>0?' '+prixNormal.toFixed(0)+'€':''}</div>`;
        }
        // Extra client connu : chip orange "+FO XX€"
        detail.extras.forEach(ex=>{
          const prixExtra=ex.prix!=null?ex.prix:(t>0?t*1.2:0);
          montant+=prixExtra;
          const prixLbl=prixExtra>0?' '+prixExtra.toFixed(0)+'€':'';
          chips+=`<div style="background:#F97316;color:#fff;border-radius:3px;font-size:8px;font-weight:700;padding:1px 4px;margin-bottom:1px;text-align:center">+${cl.id}${prixLbl}</div>`;
        });
      });
      // Extras CUSTOM (client non listé) — toujours affichés (pas de filtre client)
      if(!clFilter){
        getAffExtra(ds,dr.id).filter(e=>e.clientId==='CUSTOM').forEach(ex=>{
          const prixExtra=ex.prix||0;
          montant+=prixExtra;
          const prixLbl=prixExtra>0?' '+prixExtra.toFixed(0)+'€':'';
          chips+=`<div style="background:#F97316;color:#fff;border-radius:3px;font-size:8px;font-weight:700;padding:1px 4px;margin-bottom:1px;text-align:center">+${ex.label||'?'}${prixLbl}</div>`;
        });
      }
      if(!chips)return`<td style="text-align:center"><span style="color:#E5E7EB;font-size:9px">—</span></td>`;
      return`<td style="padding:2px 3px">${chips}</td>`;
    }).join('');

    // Colonne total jour
    let totalJour=0;
    planDrvs.forEach(dr=>{
      if(isDim||gStat(ds,dr.id)!=='present')return;
      G.clients.forEach(cl=>{
        if(clFilter&&cl.id!==clFilter)return;
        const t=parseFloat(G.tarifs[cl.id])||0;
        const det=getToursDetail(dr.id,cl.id,ds);
        totalJour+=det.normal*t;
        det.extras.forEach(ex=>{totalJour+=ex.prix!=null?ex.prix:(t>0?t*1.2:0);});
      });
      // Extras CUSTOM
      if(!clFilter){
        getAffExtra(ds,dr.id).filter(e=>e.clientId==='CUSTOM').forEach(ex=>{totalJour+=ex.prix||0;});
      }
    });
    const totalCell=isDim?`<td></td>`:totalJour>0
      ?`<td style="text-align:right;font-weight:700;font-size:11px;color:#16A34A;white-space:nowrap;padding-right:6px">${totalJour.toFixed(2)}€</td>`
      :`<td></td>`;

    rows+=`<tr style="${isDim?'':''}border-bottom:1px solid #F3F4F6">
      <td class="l" style="color:#9CA3AF;font-size:10px">${DFR[dow]}</td>
      <td class="l">${pd(d)}/${MM}</td>
      ${cells}
      ${totalCell}
    </tr>`;
  }

  // ── Ligne totaux par chauffeur ────────────────────────────────────────────
  const totParChauf=planDrvs.map(dr=>{
    let tot=0;
    for(let d=1;d<=dim;d++){
      const ds=y+'-'+MM+'-'+String(d).padStart(2,'0');
      G.clients.forEach(cl=>{
        if(clFilter&&cl.id!==clFilter)return;
        const t=parseFloat(G.tarifs[cl.id])||0;
        tot+=getTours(dr.id,cl.id,ds)*t;
      });
    }
    return`<th style="padding:6px 3px;text-align:center;font-size:10px;font-weight:700;color:${tot>0?'#16A34A':'#9CA3AF'}">${tot>0?tot.toFixed(0)+'€':'—'}</th>`;
  }).join('');
  // Total général
  let totalGeneral=0;
  planDrvs.forEach(dr=>{
    for(let d=1;d<=dim;d++){
      const ds=y+'-'+MM+'-'+String(d).padStart(2,'0');
      G.clients.forEach(cl=>{
        if(clFilter&&cl.id!==clFilter)return;
        const t=parseFloat(G.tarifs[cl.id])||0;
        totalGeneral+=getTours(dr.id,cl.id,ds)*t;
      });
    }
  });
  const tfootRow=`<tfoot><tr style="background:#F9FAFB;border-top:2px solid #E5E7EB">
    <th class="l" colspan="2" style="padding:6px 9px;font-size:10px;color:#6B7280;font-weight:600">TOTAL MOIS</th>
    ${totParChauf}
    <th style="text-align:right;padding-right:6px;font-size:12px;font-weight:700;color:#16A34A">${totalGeneral.toFixed(2)}€</th>
  </tr></tfoot>`;

  // ── Paramètres tarifs (ligne éditable) ───────────────────────────────────
  const tarifInputs=`<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:8px 12px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;margin-bottom:10px">
    <span style="font-size:11px;font-weight:700;color:#374151">&#128181; Tarifs :</span>
    ${G.clients.map(cl=>`<div style="display:flex;align-items:center;gap:4px">
      <span style="width:8px;height:8px;border-radius:50%;background:${cl.color};display:inline-block"></span>
      <span style="font-size:11px;font-weight:600;color:#374151">${cl.nom}</span>
      <input type="number" min="0" step="0.5" value="${G.tarifs[cl.id]||''}" placeholder="€"
        style="width:60px;padding:3px 6px;border:1px solid #D1D5DB;border-radius:5px;font-size:11px;text-align:right"
        onchange="G.tarifs['${cl.id}']=parseFloat(this.value)||0;dbSave();rTarifs(document.getElementById('content'))">
      <span style="font-size:10px;color:#9CA3AF">€</span>
    </div>`).join('')}
  </div>`;

  c.innerHTML=`
    <div class="ph-row">
      <div><div class="ptitle">&#128181; Tarifs — ${MFR[m]} ${y}</div>
      <div class="psub">Total général : <strong style="color:#16A34A">${totalGeneral.toFixed(2)} €</strong></div></div>
      <div style="display:flex;gap:6px">
        <button class="cnb" onclick="calTarif(-1)">&#8249;</button>
        <div style="font-size:14px;font-weight:700;padding:0 4px">${MFR[m]} ${y}</div>
        <button class="cnb" onclick="calTarif(1)">&#8250;</button>
        <div style="width:1px;height:20px;background:#E5E7EB;margin:0 4px"></div>
        ${semaines.map((s,i)=>`<button onclick="window._tarifSem=${i};window._tarifNbSem=1;rTarifs(document.getElementById('content'))" style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;border:1px solid ${window._tarifSem===i&&window._tarifNbSem===1?'#F97316':'#D1D5DB'};background:${window._tarifSem===i&&window._tarifNbSem===1?'#F97316':'#fff'};color:${window._tarifSem===i&&window._tarifNbSem===1?'#fff':'#374151'};cursor:pointer">S${i+1}</button>`).join('')}
        <button onclick="window._tarifSem=0;window._tarifNbSem=${nbSemTotal};rTarifs(document.getElementById('content'))" style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;border:1px solid ${window._tarifNbSem===nbSemTotal?'#1E2433':'#D1D5DB'};background:${window._tarifNbSem===nbSemTotal?'#1E2433':'#fff'};color:${window._tarifNbSem===nbSemTotal?'#fff':'#374151'};cursor:pointer">Tout</button>
        <button class="btn btn-or btn-sm" onclick="exportTarifsPDF()">&#128196; PDF</button>
      </div>
    </div>
    ${tarifInputs}
    ${fb}
    <div class="tbl-outer"><table class="aff-table">
      <thead><tr><th class="l">J</th><th class="l">Date</th>${thD}<th style="text-align:right;padding-right:6px">Total</th></tr></thead>
      <tbody>${rows}</tbody>
      ${tfootRow}
    </table></div>`;
}
function calTarif(d){if(d<0){if(G.m===0){G.m=11;G.y--;}else G.m--;}else{if(G.m===11){G.m=0;G.y++;}else G.m++;}rTarifs(document.getElementById('content'));}

function exportTarifsPDF(){
  const y=G.y,m=G.m,MM=String(m+1).padStart(2,'0');
  const dim=new Date(y,m+1,0).getDate();
  if(!G.tarifs)G.tarifs={};
  function getNbTours2(driverId,clientId){
    let n=0;
    for(let d=1;d<=dim;d++){
      const ds=y+'-'+MM+'-'+String(d).padStart(2,'0');
      if(getAff(ds,driverId)===clientId)n++;
      getAffExtra(ds,driverId).forEach(e=>{if(e.clientId===clientId)n++;});
    }
    return n;
  }
  const planDrvs=planDrivers();
  const totalGeneral=G.clients.reduce((s,cl)=>{
    const t=parseFloat(G.tarifs[cl.id])||0;
    let nb=0;planDrvs.forEach(dr=>{nb+=getNbTours2(dr.id,cl.id);});
    return s+nb*t;
  },0);

  const tarifLignes=G.clients.map(cl=>{
    const t=parseFloat(G.tarifs[cl.id])||0;
    let nb=0;planDrvs.forEach(dr=>{nb+=getNbTours2(dr.id,cl.id);});
    return `<tr><td style="padding:8px 12px;border-bottom:1px solid #eee">${cl.nom}</td><td style="padding:8px 12px;border-bottom:1px solid #eee;text-align:center">${t.toFixed(2)} €</td><td style="padding:8px 12px;border-bottom:1px solid #eee;text-align:center">${nb}</td><td style="padding:8px 12px;border-bottom:1px solid #eee;text-align:right;font-weight:700">${(nb*t).toFixed(2)} €</td></tr>`;
  }).join('');
  const chaufLignes=planDrvs.map(dr=>{
    let tot=0;
    G.clients.forEach(cl=>{const t=parseFloat(G.tarifs[cl.id])||0;tot+=getNbTours2(dr.id,cl.id)*t;});
    const det=G.clients.filter(cl=>{const t=parseFloat(G.tarifs[cl.id])||0;return t>0&&getNbTours2(dr.id,cl.id)>0;}).map(cl=>{const n=getNbTours2(dr.id,cl.id);const t=parseFloat(G.tarifs[cl.id])||0;return n+'×'+cl.nom+'('+t+'€)='+(n*t).toFixed(0)+'€';}).join(' · ');
    return `<tr><td style="padding:8px 12px;border-bottom:1px solid #eee;font-weight:600">${dr.nom}</td><td style="padding:8px 12px;border-bottom:1px solid #eee;font-size:11px;color:#666">${det||'—'}</td><td style="padding:8px 12px;border-bottom:1px solid #eee;text-align:right;font-weight:700;color:${tot>0?'#16A34A':'#999'}">${tot.toFixed(2)} €</td></tr>`;
  }).join('');

  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>Tarifs ${MFR[m]} ${y} — Mydka</title>
  <style>
    body{font-family:Arial,sans-serif;font-size:13px;color:#111;padding:30px;max-width:800px;margin:0 auto}
    h1{font-size:22px;color:#1E2433;margin-bottom:4px}
    h2{font-size:15px;color:#374151;margin:24px 0 8px;border-bottom:2px solid #E5E7EB;padding-bottom:6px}
    table{width:100%;border-collapse:collapse;margin-bottom:16px}
    th{background:#1E2433;color:#fff;padding:8px 12px;text-align:left;font-size:11px}
    th:last-child,td:last-child{text-align:right}
    .total-row{background:#1E2433;color:#fff;font-weight:700;font-size:15px}
    .total-row td{padding:10px 12px}
    @media print{body{padding:0}}
  </style></head><body>
  <h1>&#128181; Rapport Tarifs — ${MFR[m]} ${y}</h1>
  <div style="font-size:12px;color:#6B7280;margin-bottom:20px">Généré le ${new Date().toLocaleDateString('fr-FR')} · Mydka TourPlanner</div>
  <h2>Tarifs par client</h2>
  <table><thead><tr><th>Client</th><th style="text-align:center">Tarif/tournée</th><th style="text-align:center">Nb tournées</th><th>Total</th></tr></thead>
  <tbody>${tarifLignes}</tbody>
  <tfoot><tr class="total-row"><td colspan="3">TOTAL GÉNÉRAL</td><td>${totalGeneral.toFixed(2)} €</td></tr></tfoot></table>
  <h2>Total par chauffeur</h2>
  <table><thead><tr><th>Chauffeur</th><th>Détail</th><th>Total</th></tr></thead>
  <tbody>${chaufLignes}</tbody></table>
  </body></html>`;

  const w=window.open('','_blank');
  w.document.write(html);
  w.document.close();
  setTimeout(()=>w.print(),400);

function svVehSwap(){
  const d1=parseInt(document.getElementById('sw-d1').value);
  const d2=parseInt(document.getElementById('sw-d2').value);
  const v1=document.getElementById('sw-v1').value;
  const v2=document.getElementById('sw-v2').value;
  const date=document.getElementById('sw-date').value;
  const heure=(document.getElementById('sw-heure')||{}).value||'08:00';
  const note=document.getElementById('sw-note').value.trim();
  if(!date){toast('Date requise');return;}
  if(d1===d2){toast('Choisir 2 chauffeurs différents');return;}
  const ts=date+'T'+heure;
  const today=new Date().toISOString().slice(0,10);
  const dr1=G.drivers.find(d=>d.id===d1);
  const dr2=G.drivers.find(d=>d.id===d2);
  if(!G.vehSwaps)G.vehSwaps=[];
  if(!G.vehHistory)G.vehHistory=[];
  // Mettre à jour les camions si la date est passée ou aujourd'hui
  if(date<=today){if(dr1)dr1.veh=v1;if(dr2)dr2.veh=v2;}
  G.vehSwaps.push({d1,d2,v1,v2,date,ts,note});
  G.vehSwaps.sort((a,b)=>a.date.localeCompare(b.date));
  // Enregistrer dans l'historique
  const desc=(dr1?dr1.nom:'?')+' ↔ '+(dr2?dr2.nom:'?')+' : '+v1+' / '+v2+(note?' — '+note:'');
  G.vehHistory.push({type:'swap',ts,d1,d2,v1,v2,desc});
  closeMo();dbSave();
  // Rafraîchir la page courante
  const cur=document.querySelector('.ni.active');
  if(cur&&cur.id==='ni-vehicules')rVehicules(document.getElementById('content'));
  else rStats(document.getElementById('content'));
  toast('Échange enregistré ✓'+(date>today?' — effectif le '+date.split('-').reverse().join('/'):''));
}

// ── getVehForDay : fonction GLOBALE ─────────────────────────────────────────
// Retourne le camion du chauffeur à la date ds en rejouant tous les événements
// Retourne '|LIBRE:XX-000-XX' si libéré ce jour ou après
// Retourne 'veh|SWAP' si échange ce jour précisément
function getVehForDay(driverId, ds){
  const dr=G.drivers.find(d=>d.id===driverId);
  if(!dr)return'—';

  // Vérifier d'abord si une attribution de période couvre ce jour
  // Les vehPeriod ont priorité sur tout le reste
  const period=(G.vehPeriod||[]).find(p=>p.driverId===driverId&&ds>=p.debut&&ds<=p.fin);
  if(period){
    // Premier jour de la période → marquer comme nouveau
    const isPeriodStart=(ds===period.debut);
    return period.vehId+(isPeriodStart?'|PERIOD_START':'|PERIOD');
  }

  // Construire la timeline avec vehAvant/vehApres pour chaque événement
  const timeline=[];

  for(const s of (G.vehSwaps||[])){
    if(s.d1===driverId) timeline.push({ts:s.ts||s.date+'T00:00',date:s.date,type:'swap',vehApres:s.v1,vehAvant:s.v2});
    else if(s.d2===driverId) timeline.push({ts:s.ts||s.date+'T00:00',date:s.date,type:'swap',vehApres:s.v2,vehAvant:s.v1});
  }
  for(const h of (G.vehHistory||[])){
    if((h.type==='release'||h.type==='entretien')&&h.driverId===driverId){
      const date=h.ts?h.ts.slice(0,10):'';
      if(date)timeline.push({ts:h.ts,date,type:'release',vehApres:null,vehAvant:h.veh});
    }
    if(h.type==='assign'&&h.driverId===driverId){
      const date=h.ts?h.ts.slice(0,10):'';
      // Ne pas ajouter si un swap existe déjà au même timestamp (évite le doublon)
      const alreadyInSwaps=(G.vehSwaps||[]).some(s=>
        (s.ts||s.date+'T00:00')===h.ts&&(s.d1===driverId||s.d2===driverId));
      if(date&&!alreadyInSwaps)timeline.push({ts:h.ts,date,type:'assign',vehApres:h.veh,vehAvant:null});
    }
  }
  timeline.sort((a,b)=>a.ts.localeCompare(b.ts));

  // Camion d'origine = vehAvant du premier événement, sinon camion actuel
  // Pour les swaps : vehAvant est le camion que le chauffeur avait AVANT le swap
  // Pour les assign : vehAvant est null (on ne sait pas ce qu'il avait avant)
  // On cherche le premier event de type swap ou release avec un vehAvant connu
  let vehOrigin=dr.veh;
  for(let i=0;i<timeline.length;i++){
    if(timeline[i].vehAvant!==null&&timeline[i].vehAvant!==undefined){
      vehOrigin=timeline[i].vehAvant;
      break;
    }
  }

  // Rejouer depuis l'origine jusqu'à ds (inclus)
  let veh=vehOrigin;
  let isSwapDay=false;
  let lastLibreVeh='';
  for(const ev of timeline){
    if(ev.date>ds)break;
    isSwapDay=false;
    if(ev.type==='swap'){veh=ev.vehApres;if(ev.date===ds)isSwapDay=true;}
    else if(ev.type==='release'){lastLibreVeh=ev.vehAvant||veh||'';veh=null;}
    else if(ev.type==='assign'){veh=ev.vehApres;}
  }

  if(veh===null||veh===undefined){
    // Trouver si la libération était exactement ce jour
    const releaseToday=timeline.find(ev=>ev.type==='release'&&ev.date===ds);
    if(releaseToday){
      // Jour exact de libération → afficher "X libéré"
      return'|LIBEREJ:'+(lastLibreVeh||'');
    }
    // Jours APRÈS la libération → "Aucun camion"
    return'|LIBRE';
  }
  if(!veh||veh==='—')return'|LIBRE';
  return veh+(isSwapDay?'|SWAP':'');
}


function rStats(c){
  const y=G.y,m=G.m,dim=new Date(y,m+1,0).getDate();
  const MM=String(m+1).padStart(2,'0');
  const semaines=getSemaines(y,m);

  // ── Onglet actif ─────────────────────────────────────────────────────────
  if(!window._statsTab)window._statsTab='mois';
  const tab=window._statsTab;

  // ── Calcul tournées par chauffeur (mois entier) ───────────────────────────
  const eq=eqScore();
  const allAff=Object.keys(G.aff).filter(k=>G.aff[k]).length;
  const mx=Math.max(...G.drivers.map(d=>cf(d.id)),1);
  const avg=G.drivers.length?(allAff/G.drivers.length).toFixed(1):0;
  const planDrvs=planDrivers();

  // Calculer les jours travaillés par chauffeur par semaine
  function toursParSemaine(driverId){
    return semaines.map((s,si)=>{
      let n=0;
      for(let d=s.debut;d<=s.fin;d++){
        const dow=new Date(y,m,d).getDay();if(dow===0)continue;
        if(getAff(`${y}-${MM}-${String(d).padStart(2,'0')}`,driverId))n++;
      }
      return n;
    });
  }

  // ── Vue MOIS : tableau avec filtre semaine + colonnes jours ────────────────
  if(window._statsMoisSem===undefined)window._statsMoisSem=-1;
  const moisSem=window._statsMoisSem;
  let mDebut=1,mFin=dim;
  if(moisSem>=0&&semaines[moisSem]){mDebut=semaines[moisSem].debut;mFin=semaines[moisSem].fin;}

  // Jours ouvrés dans la période (pas dimanche)
  const joursOuvres=[];
  for(let dd=mDebut;dd<=mFin;dd++){joursOuvres.push(dd);}

  // En-tête : une colonne par jour + colonne chauffeur + camion + total
  const joursTh=joursOuvres.map(dd=>{
    const dow=new Date(y,m,dd).getDay();const isDim=dow===0;
    return '<th style="padding:4px 3px;text-align:center;min-width:'+(isDim?'32':'38')+'px;font-size:9px;font-weight:600;background:'+(isDim?'#F3F4F6':'#1E2433')+';color:'+(isDim?'#9CA3AF':'#fff')+'">'
      +DFR[dow]+'<br>'+String(dd).padStart(2,'0')+'/'+MM+'</th>';
  }).join('');

  const sorted=[...planDrvs].sort((a,b)=>cf(b.id)-cf(a.id));
  const rowsMois=sorted.map(d=>{
    const cnt=cf(d.id),diff=cnt-parseFloat(avg);
    const cls=diff>2?'e-over':diff<-2?'e-under':'e-ok';
    const lbl=diff>2?'Surcharge':diff<-2?'Sous-charge':'Équilibre';
    const vehObj=G.veh.find(v=>v.id===d.veh);
    const vehColor=vehObj&&!vehObj.actif?'#EF4444':'#374151';

    const joursCells=joursOuvres.map(dd=>{
      const ds2=`${y}-${MM}-${String(dd).padStart(2,'0')}`;
      const stat2=gStat(ds2,d.id);
      const aff2=getAff(ds2,d.id);
      const cl2=aff2?G.clients.find(x=>x.id===aff2):null;
      const hasSwap=(G.vehSwaps||[]).some(s=>s.date===ds2&&(s.d1===d.id||s.d2===d.id));
      const vehDayRaw=getVehForDay(d.id,ds2);
      const vehDayLibreJour=vehDayRaw.startsWith('|LIBEREJ:');
      const vehDayLibre=vehDayRaw==='|LIBRE';
      const vehDayPeriod=vehDayRaw.endsWith('|PERIOD')||vehDayRaw.endsWith('|PERIOD_START');
      const vehDayPeriodStart=vehDayRaw.endsWith('|PERIOD_START');
      const libreImmatCell=vehDayLibreJour?vehDayRaw.slice(9):'';
      const cellLibre=vehDayLibreJour||vehDayLibre;
      const vehDay=vehDayRaw.endsWith('|SWAP')?vehDayRaw.replace('|SWAP',''):(vehDayLibre||vehDayLibreJour)?'':vehDayPeriod?vehDayRaw.replace('|PERIOD_START','').replace('|PERIOD',''):vehDayRaw;

      if(new Date(y,m,dd).getDay()===0)return '<td style="background:#FAFAFA;padding:3px;text-align:center"><span style="font-size:8px;color:#D1D5DB">Dim</span></td>';
      if(d.dateEntree&&ds2<d.dateEntree)return '<td style="background:#F9FAFB;padding:3px"><span style="font-size:8px;color:#E5E7EB">—</span></td>';
      if(stat2==='maladie') return '<td style="text-align:center;background:rgba(139,92,246,.12);padding:3px"><span style="font-size:9px;color:#6D28D9;font-weight:700">ML</span></td>';
      if(stat2==='conge')   return '<td style="text-align:center;background:rgba(245,158,11,.12);padding:3px"><span style="font-size:9px;color:#92400E;font-weight:700">CG</span></td>';
      if(stat2==='absent')  return '<td style="text-align:center;background:rgba(239,68,68,.12);padding:3px"><span style="font-size:9px;color:#DC2626;font-weight:700">ABS</span></td>';
      if(cl2){
        return '<td style="text-align:center;background:'+(hasSwap?'#FFFBEB':cellLibre?'#FEF2F2':vehDayPeriodStart?'#EFF6FF':'#fff')+';padding:3px;border-left:1px solid #F3F4F6">'
          +'<div style="background:'+cl2.color+';color:#fff;border-radius:3px;font-size:9px;font-weight:700;padding:1px 3px">'+cl2.id+'</div>'
          +(vehDayLibreJour
            ?'<div style="font-size:7px;color:#EF4444;font-weight:700">&#128275; '+libreImmatCell+'<br>libéré</div>'
            :vehDayLibre
            ?'<div style="font-size:7px;color:#9CA3AF">Aucun camion</div>'
            :vehDay
              ?'<div style="font-size:8px;color:'+(hasSwap?'#92400E':'#9CA3AF')+';font-weight:'+(hasSwap?'700':vehDayPeriod?'700':'400')+';margin-top:1px">'+(vehDayPeriodStart?'★ ':'')+vehDay+(hasSwap?' ↔':'')+'</div>'
              :'')+'</td>';
      }
      if(d.dateEntree&&ds2<d.dateEntree)return '<td style="background:#F9FAFB;padding:3px"><span style="color:#E5E7EB">—</span></td>';
      const vehEmp=vehDay&&!vehDayLibre&&!vehDayLibreJour?vehDay:'';
      return '<td style="text-align:center;padding:3px">'+(vehEmp?'<div style="font-size:7px;color:#9CA3AF">'+vehEmp+'</div>':'<span style="color:#E5E7EB;font-size:9px">·</span>')+'</td>';
    }).join('');

    return '<tr>'
      +'<td style="padding:5px 8px;white-space:nowrap;position:sticky;left:0;background:#fff;z-index:1;border-right:2px solid #E5E7EB">'
        +'<div style="display:flex;align-items:center;gap:6px">'
          +'<div style="width:22px;height:22px;border-radius:50%;background:'+dc(d.id)+';color:#fff;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+ini(d.nom)+'</div>'
          +'<div><div style="font-size:11px;font-weight:700">'+d.nom+'</div>'
          +'<div style="font-size:9px;color:'+vehColor+'">&#128667; '+(d.veh||'—')+'</div></div>'
        +'</div>'
      +'</td>'
      +joursCells
      +'<td style="text-align:center;padding:5px 8px;font-weight:700;font-size:12px;border-left:2px solid #E5E7EB;white-space:nowrap">'+cnt+'</td>'
      +'<td style="text-align:center;padding:5px 4px;white-space:nowrap"><span class="ebadge '+cls+'" style="font-size:9px">'+lbl+'</span></td>'
    +'</tr>';
  }).join('');

  // Séparateurs de semaine dans l'en-tête
  const semSepTh=joursOuvres.map((dd,idx)=>{
    const dow=new Date(y,m,dd).getDay();
    return dow===1||idx===0?'<th style="padding:4px 3px;text-align:center;min-width:38px;font-size:9px;font-weight:600;border-left:2px solid rgba(255,255,255,.3)">'
      +DFR[dow]+'<br>'+String(dd).padStart(2,'0')+'/'+MM+'</th>'
    :'<th style="padding:4px 3px;text-align:center;min-width:38px;font-size:9px;font-weight:600">'
      +DFR[dow]+'<br>'+String(dd).padStart(2,'0')+'/'+MM+'</th>';
  }).join('');

  const semFilterBtns='<div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:10px">'
    +'<span style="font-size:11px;color:#6B7280;font-weight:600">Vue :</span>'
    +'<button onclick="setMoisSem(-1)" style="padding:3px 10px;border-radius:5px;font-size:11px;font-weight:700;border:1px solid '+(moisSem===-1?'#1E2433':'#D1D5DB')+';background:'+(moisSem===-1?'#1E2433':'#fff')+';color:'+(moisSem===-1?'#fff':'#374151')+';cursor:pointer">Tout le mois</button>'
    +semaines.map((s,i)=>'<button onclick="setMoisSem('+i+')" style="padding:3px 10px;border-radius:5px;font-size:11px;font-weight:700;border:1px solid '+(moisSem===i?'#F97316':'#D1D5DB')+';background:'+(moisSem===i?'#F97316':'#fff')+';color:'+(moisSem===i?'#fff':'#374151')+';cursor:pointer">S'+(i+1)+' ('+String(s.debut).padStart(2,'0')+'/'+MM+'-'+String(s.fin).padStart(2,'0')+'/'+MM+')</button>').join('')
  +'</div>';

  const tableMois=semFilterBtns
    +'<div style="font-size:10px;color:#6B7280;margin-bottom:8px">&#128260; fond jaune = échange camion · ML=Maladie · CG=Congé · ABS=Absence</div>'
    +'<div style="overflow-x:auto;border-radius:10px;border:1px solid #E5E7EB">'

    +'</tr></thead>'
    +'<tbody>'+rowsMois+'</tbody>'
    +'</table></div>';

  // ── Vue ÉCHANGES VÉHICULES ────────────────────────────────────────────────
  const swapsMois=(G.vehSwaps||[]).filter(s=>s.date.startsWith(y+'-'+MM));
  const rowsSwaps=swapsMois.length?swapsMois.map((s,i)=>{
    const dr1=G.drivers.find(d=>d.id===s.d1),dr2=G.drivers.find(d=>d.id===s.d2);

    +'</tr>';
  }).join(''):'<tr><td colspan="7" style="text-align:center;color:#9CA3AF;padding:20px">Aucun échange ce mois</td></tr>';

  const tableSwaps='<div style="overflow-x:auto;border-radius:10px;border:1px solid #E5E7EB">'
    +'<table style="width:100%;border-collapse:collapse;background:#fff">'
    +'<thead><tr style="background:#1E2433;color:#fff">'
      +'<th style="padding:8px;font-size:11px;text-align:left">Date</th>'
      +'<th style="padding:8px;font-size:11px;text-align:left">Chauffeur 1</th>'
      +'<th style="padding:8px;font-size:11px">→ Camion</th>'
      +'<th style="padding:8px;font-size:11px;text-align:left">Chauffeur 2</th>'
      +'<th style="padding:8px;font-size:11px">→ Camion</th>'
      +'<th style="padding:8px;font-size:11px">Note</th>'
      +'<th></th>'
    +'</tr></thead>'
    +'<tbody>'+rowsSwaps+'</tbody>'
    +'</table></div>';

  // ── Vue PLANNING DÉTAILLÉ PAR CHAUFFEUR ─────────────────────────────────────
  // Semaines pour filtrage
  const semaines2=getSemaines(y,m);
  if(window._statsSem===undefined)window._statsSem=-1; // -1 = tout le mois
  const statsSem=window._statsSem;

  // Filtre chauffeur actif
  if(!window._statsDrv)window._statsDrv=planDrvs.length?planDrvs[0].id:0;
  // S'assurer que le chauffeur sélectionné est toujours valide
  if(!planDrvs.find(d=>d.id===window._statsDrv)&&planDrvs.length)window._statsDrv=planDrvs[0].id;
  const selDrv=window._statsDrv;
  const selD=planDrvs.find(d=>d.id===selDrv);

  // Boutons de sélection chauffeur
  const drvBtns='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px">'
    +planDrvs.map(d=>'<button onclick="setStatsDrv('+d.id+')" style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;border:2px solid '+(selDrv===d.id?dc(d.id):'#E5E7EB')+';background:'+(selDrv===d.id?dc(d.id):'#fff')+';color:'+(selDrv===d.id?'#fff':'#374151')+';cursor:pointer">'
      +'<div style="width:18px;height:18px;border-radius:50%;background:'+(selDrv===d.id?'rgba(255,255,255,.3)':dc(d.id))+';color:#fff;font-size:7px;font-weight:700;display:flex;align-items:center;justify-content:center">'+ini(d.nom)+'</div>'
      +d.nom.split(' ')[0]
    +'</button>').join('')
  +'</div>';

  // Calendrier du chauffeur sélectionné
  function buildCalDrv(d){
    if(!d)return'<div style="color:#9CA3AF;padding:20px;text-align:center">Sélectionner un chauffeur</div>';
    const totalTours=Object.keys(G.aff).filter(k=>{
      if(!G.aff[k])return false;
      const parts=k.split('_');
      return parseInt(parts[parts.length-1])===d.id && k.startsWith(y+'-'+MM);
    }).length;
    const vehObj=G.veh.find(v=>v.id===d.veh);
    const header='<div style="display:flex;align-items:center;gap:10px;padding:12px 16px;background:'+dc(d.id)+';border-radius:10px 10px 0 0;color:#fff">'
      +'<div style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700">'+ini(d.nom)+'</div>'
      +'<div><div style="font-weight:700;font-size:14px">'+d.nom+'</div>'
      +'<div style="font-size:11px;opacity:.85">'+totalTours+' tournées ce mois'+(d.veh?' · &#128667; '+d.veh:'')+'</div></div>'
    +'</div>';

    // En-têtes jours de semaine (Lun→Dim)
    const dowH=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].map((j,i)=>'<div style="background:#F3F4F6;padding:5px 2px;text-align:center;font-size:10px;font-weight:700;color:'+(i===6?'#EF4444':'#6B7280')+'">'+j+'</div>').join('');

    // Grille : 7 colonnes (Lun-Dim), commencer à la bonne colonne
    const fd=new Date(y,m,1).getDay(); // 0=Dim,1=Lun...
    const startCol=fd===0?6:fd-1; // Lun=0, Mar=1... Dim=6
    let cells='';
    for(let i=0;i<startCol;i++)cells+='<div></div>';

    for(let dd=1;dd<=dim;dd++){
      const dow=new Date(y,m,dd).getDay();
      // Dimanche : affiché en grisé (fermé)
      const ds2=`${y}-${MM}-${String(dd).padStart(2,'0')}`;
      const aff2=getAff(ds2,d.id);
      const stat2=gStat(ds2,d.id);
      const cl2=aff2?G.clients.find(x=>x.id===aff2):null;
            const vehRaw=getVehForDay(d.id,ds2);
      const isSwap=vehRaw.endsWith('|SWAP');
      const isLibreJour=vehRaw.startsWith('|LIBEREJ:');
      const isLibre=vehRaw==='|LIBRE';
      const isPeriodStart=vehRaw.endsWith('|PERIOD_START');
      const isPeriod=vehRaw.endsWith('|PERIOD')||isPeriodStart;
      const libreImmat=isLibreJour?vehRaw.slice(9):'';
      const periodVeh=isPeriod?vehRaw.replace('|PERIOD_START','').replace('|PERIOD',''):'';
      const vehLabel=isSwap?vehRaw.replace('|SWAP',''):isLibre?'':(isPeriod?periodVeh:vehRaw);
      const today=new Date();today.setHours(0,0,0,0);
      const isToday=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===dd;
      const isFutur=new Date(ds2+'T00:00:00')>today;

      let bg='#fff',border='1px solid #E5E7EB',txtColor='#374151';
      let content='';
      // Camion : libéré si congé OU si libération explicite (|LIBRE)
      const isVehLibre = stat2==='conge' || isLibre || isLibreJour;
      const showVeh = !isVehLibre && vehLabel && vehLabel!=='—';
      const vehBadgeSm = showVeh
        ? '<div style="font-size:8px;color:'+(isPeriod?'#2563EB':isSwap?'#B45309':'#9CA3AF')+';margin-top:1px;font-weight:'+(isPeriod||isSwap?'700':'400')+'">'+(isPeriod?'&#128197; ':''+(isSwap?'':'&#128667; '))+vehLabel+(isSwap?' ↔':'')+(isPeriodStart?' ★':'')+'</div>'
        : isLibreJour
          ? '<div style="font-size:8px;color:#EF4444;margin-top:1px;font-weight:700">&#128275; '+libreImmat+' libéré</div>'
          : isLibre
            ? '<div style="font-size:8px;color:#9CA3AF;margin-top:1px">Aucun camion</div>'
            : '';
      if(stat2==='maladie'){
        bg='rgba(139,92,246,.1)';border='1px solid #A78BFA';
        content='<div style="font-size:9px;color:#6D28D9;font-weight:700;margin-top:2px">&#x1F912; Maladie</div>'
          +vehBadgeSm; // camion toujours affiché en maladie
      } else if(stat2==='conge'){
        bg='rgba(245,158,11,.1)';border='1px solid #FCD34D';
        content='<div style="font-size:9px;color:#92400E;font-weight:700;margin-top:2px">&#x1F334; Congé</div>'
          +'<div style="font-size:8px;color:#D1D5DB;margin-top:1px">camion libéré</div>';
      } else if(stat2==='absent'){
        bg='rgba(239,68,68,.1)';border='1px solid #FCA5A5';
        content='<div style="font-size:9px;color:#DC2626;font-weight:700;margin-top:2px">&#x274C; Absent</div>'
          +vehBadgeSm; // camion affiché en absence
      } else if(cl2){
        bg=isPeriodStart?'#EFF6FF':isSwap?'#FFFBEB':'#F9FAFB';
        border='1px solid '+(isPeriodStart?'#93C5FD':isSwap?'#F59E0B':'#E5E7EB');
        // Courses supplémentaires
        const extras2=getAffExtra(ds2,d.id);
        const extraBadges=extras2.map(e=>{
          const ecl=G.clients.find(x=>x.id===e.clientId);
          const elbl=e.clientId==='CUSTOM'?e.label:(ecl?ecl.id:'?');
          const ecolor=ecl?ecl.color:'#9CA3AF';
          return '<div style="margin-top:1px;background:'+ecolor+';color:#fff;border-radius:3px;font-size:8px;font-weight:700;padding:1px 3px;text-align:center;opacity:.85">+'+elbl+'</div>';
        }).join('');
        content='<div style="margin-top:2px;background:'+cl2.color+';color:#fff;border-radius:3px;font-size:9px;font-weight:700;padding:1px 4px;text-align:center">'+cl2.nom+'</div>'
          +extraBadges
          +vehBadgeSm;
      } else if(isLibreJour){
        // Jour exact de libération
        bg='#FEF2F2';border='2px solid #EF4444';
        content='<div style="font-size:9px;color:#DC2626;font-weight:700;margin-top:2px">&#128275; '+libreImmat+'</div>'
          +'<div style="font-size:8px;color:#EF4444;margin-top:1px">libéré</div>'
          +(cl2?'<div style="margin-top:2px;background:'+cl2.color+';color:#fff;border-radius:3px;font-size:9px;font-weight:700;padding:1px 4px;text-align:center">'+cl2.nom+'</div>':'');
      } else if(isLibre){
        // Jours après libération
        bg='#F9FAFB';border='1px dashed #D1D5DB';
        content='<div style="font-size:9px;color:#9CA3AF;margin-top:2px">Aucun camion</div>';
      } else {
        // Présent sans tournée
        if(isPeriod){
          bg='#EFF6FF';border='1px solid #BFDBFE';
          content='<div style="font-size:9px;color:#1D4ED8;margin-top:2px">'+(isPeriodStart?'★ ':'')+'Période</div>'
            +vehBadgeSm;
        } else {
          content='<div style="font-size:9px;color:#D1D5DB;margin-top:2px">—</div>'
            +vehBadgeSm;
        }
      }

      if(dow===0){
        // Dimanche : afficher camion seulement si passé ou aujourd'hui
        cells+='<div style="background:#FAFAFA;border:1px solid #F3F4F6;border-radius:6px;padding:4px;min-height:68px;opacity:.75;display:flex;flex-direction:column;">'

      } else {

          +'<div style="font-size:10px;font-weight:700;color:'+(isToday?'#fff':txtColor)+';width:18px;height:18px;border-radius:50%;background:'+(isToday?'#F97316':'transparent')+';display:flex;align-items:center;justify-content:center;flex-shrink:0">'+dd+'</div>'

          +(vehBadgeSm?'<div style="margin-top:auto;padding-top:2px;border-top:1px solid rgba(0,0,0,.05)">'+vehBadgeSm+'</div>':'')
        +'</div>';
      }
    }

    return header
      +'<div style="background:#fff;border:1px solid #E5E7EB;border-top:none;border-radius:0 0 10px 10px;padding:10px">'
      +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px">'+dowH+'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">'+cells+'</div>'
      +'<div style="font-size:10px;color:#9CA3AF;margin-top:8px">&#128260; fond jaune = échange · fond bleu = attribution période · ML=Maladie · CG=Congé</div>'
      +'</div>';
  }

  const tablePlanning=drvBtns+(selD?buildCalDrv(selD):'');

  const tabStyle=(t)=>'padding:7px 16px;font-size:12px;font-weight:700;border:none;cursor:pointer;border-bottom:2px solid '+(tab===t?'#F97316':'transparent')+';background:none;color:'+(tab===t?'#F97316':'#6B7280');

  c.innerHTML=
    '<div class="ph-row"><div><div class="ptitle">Statistiques</div>'
    +'<div class="psub">'+MFR[m]+' '+y+'</div></div>'
    +'</div>'

    +'<div class="sc3">'
      +'<div class="scard"><div class="sl">Total tournées</div><div class="sv">'+allAff+'</div></div>'

    +'</div>'

    +'<div style="display:flex;border-bottom:1px solid #E5E7EB;margin-bottom:14px">'
      +'<button style="'+tabStyle('mois')+'" onclick="setStatsTab(&quot;mois&quot;)">&#128202; Résumé mois</button>'

      +'<button style="'+tabStyle('swaps')+'" onclick="setStatsTab(&quot;swaps&quot;)">&#128260; Échanges camions</button>'
    +'</div>'

    +(tab==='mois'?tableMois:tab==='planning'?tablePlanning:tableSwaps);
